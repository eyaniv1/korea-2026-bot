<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Korea 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#e0e0e0}

/* Page system */
.pages-container{display:flex;height:100vh;width:100%;overflow:hidden;transition:transform 0.35s cubic-bezier(.4,0,.2,1)}
.page{min-width:100%;height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:2000;background:#12122aee;backdrop-filter:blur(10px);border-top:1px solid #2a2a4a;display:flex;align-items:center;height:56px;padding:0 6px}
.bottom-nav .nav-scroll{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;padding:8px 4px;scrollbar-width:none}
.bottom-nav .nav-scroll::-webkit-scrollbar{display:none}
.nav-btn{padding:6px 11px;border-radius:8px;font-size:12px;color:#aaa;background:#1a1a3a;white-space:nowrap;border:none;cursor:pointer;transition:all .2s;flex-shrink:0}
.nav-btn.active{background:#e74c3c;color:#fff}
.nav-btn.seoul{border-bottom:2px solid #3498db}
.nav-btn.jeju{border-bottom:2px solid #2ecc71}
.nav-btn.busan{border-bottom:2px solid #e67e22}
.nav-btn.travel{border-bottom:2px solid #9b59b6}
.nav-arrow{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:4px 8px;flex-shrink:0}
.nav-arrow:active{color:#fff}

/* Page header */
.page-header{background:linear-gradient(135deg,#1a1a3e,#0f0f1a);padding:20px 16px 16px;border-bottom:1px solid #2a2a4a}
.page-header .day-num{display:inline-flex;align-items:center;justify-content:center;background:#e74c3c;color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;font-weight:bold;margin-right:12px;vertical-align:middle}
.page-header h2{display:inline;font-size:20px;color:#fff;vertical-align:middle}
.page-header .sub{color:#888;font-size:13px;margin-top:6px}

/* Map */
.map-wrap{margin:12px;border-radius:12px;overflow:hidden;background:#16163a}
.map{height:300px;width:100%}
@media(min-width:768px){.map{height:400px}}

/* POI list */
.poi-list{padding:0 12px}
.poi-item{display:flex;gap:10px;padding:12px;background:#16163a;border-radius:10px;margin-bottom:8px;align-items:flex-start}
.poi-num{background:#e74c3c;color:#fff;width:28px;height:28px;min-width:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;margin-top:2px}
.poi-body{flex:1;min-width:0}
.poi-time{font-size:11px;color:#888;background:#1e1e4a;display:inline-block;padding:1px 7px;border-radius:3px;margin-bottom:4px}
.poi-name{font-size:14px;color:#fff;line-height:1.4}
.poi-name a{color:#5dade2;text-decoration:none}
.poi-meta{font-size:12px;color:#aaa;margin-top:3px}
.poi-badges{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;color:#fff}
.badge-hike{background:#27ae60}.badge-bike{background:#2980b9}.badge-food{background:#c0392b}.badge-transport{background:#7f8c8d}

/* POI actions row */
.poi-actions{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.poi-action-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;color:#5dade2;background:#1e1e4a;border:none;cursor:pointer;text-decoration:none;transition:background .2s}
.poi-action-btn:hover,.poi-action-btn:active{background:#2a2a5a}
.poi-action-btn.gmaps{color:#4ade80}

/* Info modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:3000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#1a1a3e;border-radius:14px;padding:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative;border:1px solid #2a2a5a}
.modal h3{color:#fff;font-size:17px;margin-bottom:10px;padding-right:30px}
.modal p{color:#bbb;font-size:14px;line-height:1.7;margin-bottom:10px}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#888;font-size:24px;cursor:pointer;line-height:1}
.modal-close:hover{color:#fff}

/* Section boxes */
.section-box{margin:12px;padding:14px;background:#16163a;border-radius:10px}
.section-box.hotel{border-left:3px solid #f39c12}
.section-box.transport{border-left:3px solid #3498db}
.section-box h4{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.section-box .detail{font-size:14px;color:#ddd;line-height:1.6}
.section-box a{color:#f5b041;text-decoration:none}
.section-box.transport a{color:#5dade2}
.voucher-link{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;color:#2ecc71;background:#1e1e4a;text-decoration:none;margin-top:6px}

/* Summary page */
.summary-page{padding:20px 16px}
.summary-page h2{font-size:22px;color:#fff;margin-bottom:16px;border-bottom:2px solid #e74c3c;padding-bottom:8px}
.summary-page h3{font-size:16px;color:#ddd;margin:16px 0 8px}
.s-table{width:100%;border-collapse:collapse;margin-bottom:16px;display:block;overflow-x:auto}
.s-table th{background:#1e1e4a;padding:8px 10px;text-align:left;font-size:12px;color:#aaa;white-space:nowrap}
.s-table td{padding:8px 10px;border-bottom:1px solid #1e1e3a;font-size:13px;white-space:nowrap}
.s-table a{color:#5dade2;text-decoration:none}

/* Missing page */
.missing-page{padding:20px 16px}
.missing-page h2{font-size:22px;color:#fff;margin-bottom:16px;border-bottom:2px solid #f39c12;padding-bottom:8px}
.tier-title{font-size:15px;margin:16px 0 10px;font-weight:bold}
.tier-title.t1{color:#e74c3c}.tier-title.t2{color:#f39c12}.tier-title.t3{color:#3498db}.tier-title.t4{color:#2ecc71}
.m-item{background:#16163a;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.m-item .m-title{font-size:14px;font-weight:bold;color:#fff;margin-bottom:4px}
.m-item .m-title a{color:#5dade2;text-decoration:none}
.m-item .m-desc{font-size:13px;color:#aaa;line-height:1.5}

/* Swipe hint */
.swipe-hint{text-align:center;padding:8px;font-size:11px;color:#555}

/* Numbered map icons */
.n-icon{background:#e74c3c;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)}
</style>
</head>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">

    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
  </div>

  <div class="nav-scroll" id="nav-scroll"></div>
  <button class="nav-arrow" onclick="goPage(currentPage+1)">›</button>
</div>

// ===== POI DESCRIPTIONS =====
const DESC={
"incheon_airport":"Incheon International Airport (ICN) is South Korea's main gateway, consistently ranked among the world's best. It features free cultural experience zones and Korean gardens. Grab a T-money transit card at the convenience stores in arrivals — it works on subways, buses, and taxis across the country.",
"myeongdong":"Myeongdong is Seoul's premier shopping and entertainment district, packed with Korean cosmetics shops, fashion boutiques, and street food stalls. Visit in the evening when the food vendors are in full swing and the neon lights create an electric atmosphere.",
"yukjeon_hoekwan":"Yukjeon Hoekwan is a beloved Seoul restaurant famous for its bulgogi-jeongol, a simmering pot of marinated beef with vegetables and glass noodles. Operating since 1959, it's one of the city's most iconic traditional dining experiences. Arrive before peak hours as waits can be long.",
"cheonggyecheon":"Cheonggyecheon is a restored 10.9km stream running through downtown Seoul, transformed from a covered highway into a peaceful urban oasis in 2005. Lined with walking paths, public art, and small waterfalls, it's beautifully illuminated at night.",
"gyeongbokgung":"Gyeongbokgung is the grandest of Seoul's Five Grand Palaces, built in 1395 as the main royal palace of the Joseon Dynasty. Its grounds include the iconic throne hall and the Gyeonghoeru Pavilion over a lotus pond. Wearing hanbok gets you free admission, and the guard changing ceremony happens multiple times daily.",
"bukchon":"Bukchon Hanok Village is a residential neighborhood between two palaces, famous for hundreds of traditional hanok houses with curved tile rooftops. Walking its hilly alleyways offers a glimpse into Korea's architectural heritage against a modern skyline. Keep noise down — this is still a living neighborhood.",
"myeongdong_kyoja":"Myeongdong Kyoja is a no-frills institution famous for handmade kalguksu (knife-cut noodle soup) and mandu (dumplings) since 1966. The rich savory broth and chewy noodles draw long lines. The menu is intentionally limited — just pick between noodles, dumplings, or bibimbap.",
"seochon":"Seochon is a charming neighborhood west of Gyeongbokgung, once home to Joseon-era artisans. Today it's filled with independent cafés, galleries, and boutiques in quiet alleyways alongside traditional hanok homes. More authentic and less touristy than nearby Bukchon.",
"ssamjigil":"Ssamjigil is a creative open-air shopping complex in Insadong with a continuous spiral walkway from ground level to the rooftop. It houses shops selling handmade crafts, traditional Korean goods, and quirky souvenirs alongside artist studios and cafés.",
"jogyesa":"Jogyesa is the chief temple of the Jogye Order of Korean Buddhism in the heart of Seoul. During Buddha's Birthday season (around May), thousands of colorful paper lanterns are strung across the temple grounds — a stunning sight that will be up during your visit.",
"maple_tree":"Maple Tree House is one of Seoul's most acclaimed Korean BBQ restaurants in Itaewon, known for high-quality aged galbi and pork belly in a stylish setting. Reservations are strongly recommended, especially for dinner on weekends.",
"yeouido_bike":"Yeouido Park sits on an island in the Han River and serves as a popular starting point for Seoul's extensive riverside bike path network. The paved paths stretch over 40km along both banks, offering skyline views and a car-free ride through the city.",
"jamsil_bike":"The Jamsil area along the Han River, near Lotte World Tower (Korea's tallest building), makes a great turnaround point for a riverside bike ride from Yeouido. The stretch passes through several parks with facilities and scenic overlooks.",
"inwangsan":"Inwangsan (338m) is a granite peak in central Seoul with the restored Seoul Fortress Wall running along its ridge. The hike offers panoramic city views and passes shamanistic shrines still actively used. Moderately steep but short at about 1.5–2 hours round trip.",
"n_seoul_tower":"N Seoul Tower sits atop Namsan Mountain at 480m above sea level, offering 360-degree panoramic views. Built in 1969, it's the city's most recognizable landmark. Take the Namsan cable car up and visit at sunset to see Seoul transition to a sea of lights.",
"jungsik":"Jungsik is a Michelin-starred restaurant reimagining Korean cuisine through modern fine-dining techniques. Chef Yim Jung-sik pioneered contemporary Korean gastronomy, blending traditional flavors with global culinary arts. Book well in advance for the multi-course tasting menu.",
"jeju_airport":"Jeju International Airport serves South Korea's largest island. The Gimpo–Jeju route is among the world's busiest flight corridors. Pick up your rental car here — having wheels on Jeju is essential as public transit between attractions is limited.",
"saryeoni":"Saryeoni Forest Trail is a serene, mostly flat woodland path through dense cypress and cedar forest in Jeju's interior highlands. The gentle course is accessible to all fitness levels and feels wonderfully removed from the coast's tourist bustle. Go in the morning for misty, atmospheric conditions.",
"dombedon":"Dombedon is a popular Jeju restaurant specializing in heuk-dwaeji (Jeju black pork), a local breed prized for rich flavor and tender texture. The pork is grilled at your table with fresh local sides. Arrive early for dinner as it fills up quickly.",
"seongsan_port":"Seongsan Port is the departure point for ferries to Udo Island on Jeju's eastern coast. Ferries run frequently and take about 15 minutes. Bring your passport for boarding, and check the last return ferry time so you don't get stranded.",
"udo_island":"Udo Island is a small, picturesque island off Jeju's east coast known for turquoise waters, coral sand beaches, and peanut ice cream. An electric bike is the best way to circle it in a few hours, passing lighthouses, stone walls, and the famous Sanho Beach.",
"seongsan_ilchulbong":"Seongsan Ilchulbong (Sunrise Peak) is a dramatic volcanic tuff cone rising 182m from the sea, formed by an underwater eruption over 5,000 years ago. The 25-minute climb rewards you with sweeping ocean views and a look into the bowl-shaped crater. UNESCO World Heritage site.",
"jusangjeolli":"Daepo Jusangjeolli Cliff is a striking formation of hexagonal basalt columns along Jeju's southern coast, created when lava cooled rapidly upon hitting the ocean. The geometric pillars rising from crashing waves make it one of Jeju's most photogenic sites. A short boardwalk leads to the viewpoint.",
"olle_trail_7":"Jeju Olle Trail Section 7 is widely considered the most scenic segment of the island's famous walking route, running along the southern coast. The path passes volcanic cliffs, tangerine orchards, coastal villages, and ocean vistas. Well-marked with blue and orange ribbons.",
"osulloc":"O'sulloc Tea Museum is a sleek complex surrounded by emerald-green tea fields in Jeju's western highlands. It covers Korean tea history and offers tastings of Jeju-grown green teas and matcha desserts. Admission is free, and the adjacent Innisfree shop sells unique tea-based skincare.",
"hyeopjae":"Hyeopjae Beach features white coral sand and shallow emerald waters with views of Biyangdo Island. The gentle waves are great for wading, and black lava rocks provide dramatic contrast. Cafés and restaurants line the road behind the beach.",
"gimhae_airport":"Gimhae International Airport is Busan's main airport with convenient light rail connections to downtown. Smaller and easier to navigate than Incheon. The Busan-Gimhae Light Rail connects directly to the city's metro system.",
"gamcheon":"Gamcheon Culture Village is Busan's colorful hillside community, often called the 'Machu Picchu of Busan.' Tightly packed pastel houses cascade down a steep slope, filled with murals, sculptures, and galleries. Wear comfortable shoes and follow the stamp-trail map.",
"haeundae":"Haeundae Beach is Busan's most famous beach, a wide crescent of sand backed by high-rise hotels. The beachfront boardwalk and surrounding alleys full of restaurants make it lively year-round, even outside swimming season.",
"amsogalbi":"Haeundae Amsogalbi-jip is a beloved Busan institution known for tender marinated beef short ribs grilled over charcoal. A go-to spot for locals celebrating special occasions. Pair your galbi with naengmyeon (cold noodles) for the classic combo.",
"igidae":"Igidae Coastal Walk is a stunning 5km cliffside trail offering dramatic views of Haeundae's skyline, Gwangan Bridge, and the open sea. The path passes through pine forests and along rocky bluffs with panoramic viewpoints. About 2 hours with some stairs.",
"yonggungsa":"Haedong Yonggungsa is a rare seaside Buddhist temple perched on Busan's rocky coastline, built in 1376. Unlike most Korean temples in mountains, this one sits at the ocean's edge with waves crashing below. Arrive early to beat tour groups.",
"bulguksa":"Bulguksa Temple is a masterpiece of Silla-era Buddhist architecture in Gyeongju, originally built in 528. A UNESCO World Heritage Site housing several National Treasures including the Dabotap and Seokgatap stone pagodas.",
"seokguram":"Seokguram Grotto is an 8th-century artificial stone cave housing a magnificent seated Buddha gazing toward the East Sea. Considered one of the finest Buddhist sculptures in the world — a UNESCO World Heritage pinnacle. Viewing is through glass to preserve the climate.",
"hwangridan":"Hwangridan-gil is Gyeongju's trendy street blending ancient heritage with hip cafés, boutiques, and restaurants in renovated hanok buildings. The social heart of Gyeongju for younger visitors — ideal for dinner after a day of temple visits.",
"wolji":"Wolji Pond (formerly Anapji) is a Silla Dynasty palace garden from 674 AD. The pond and three islands are flanked by pavilions that reflect perfectly in still water. Visit at night when everything is illuminated — one of Korea's most magical evening scenes.",
"jagalchi":"Jagalchi Market is Korea's largest seafood market along Busan's waterfront. Upper-floor restaurants prepare fresh catches on the spot. Head to the second floor for sit-down raw fish meals with harbor views — prices are negotiable.",
"biff":"BIFF Square honors Busan's famous film festival with handprints of international directors. The surrounding streets are packed with street food, especially hotteok (sweet stuffed pancakes). Right next to Jagalchi and Gukje markets.",
"blueline":"Haeundae Blueline Park features the Sky Capsule — colorful pods gliding along a coastal rail track with gorgeous ocean views. The Beach Train runs the same route in a vintage railcar. Book Sky Capsule tickets online in advance as they sell out.",
"gukje":"Gukje Market is one of Busan's largest traditional markets, established by Korean War refugees in 1950. Its maze of covered alleys sells everything from clothing to housewares and street food. The adjacent Bupyeong Market is great for late-night food.",
"busan_station":"Busan Station is the city's main KTX hub, connecting to Seoul in about 2.5 hours. Book tickets via the Korail app in advance for better seats — aim for a window to enjoy the countryside views.",
"hongdae":"Hongdae is Seoul's youthful creative neighborhood around Hongik University, famous for indie music, street performances, and nightlife. By day: quirky shops and themed cafés. By night: one of Seoul's liveliest entertainment districts.",
"bukhansan":"Bukhansan National Park is a dramatic granite mountain park on Seoul's northern edge — one of the most-visited national parks per square meter in the world. The Bukhansanseong trail follows a historic fortress wall to rugged peaks with sweeping city views.",
"icheon":"Icheon is Korea's center of ceramic arts, carrying on a tradition from the Goryeo Dynasty's celadon masters. The annual Ceramic Festival showcases master potters and hands-on workshops. Also famous for some of Korea's best rice.",
"naksan":"Naksan Park is a hilltop park on Seoul's old eastern fortress wall with panoramic views of Dongdaemun and the cityscape. The restored Seoul City Wall makes for a pleasant walk connecting to nearby Ihwa Mural Village. Sunset is the best time.",
"ihwa":"Ihwa Mural Village is an art-filled hillside neighborhood where colorful murals transform ordinary walls into an open-air gallery. Part of a 2006 urban regeneration project. Be respectful of residents and keep noise down.",
"gwangjang":"Gwangjang Market is Seoul's oldest traditional market (1905) and a must-visit for street food. The central food alley is legendary for bindaetteok (mung bean pancakes), mayak gimbap, and yukhoe (beef tartare). Grab a seat at any bustling stall.",
"ddp":"Dongdaemun Design Plaza is Zaha Hadid's futuristic landmark serving as a hub for design exhibitions and cultural events. Its aluminum exterior is striking at night alongside the illuminated LED rose garden. Check the exhibition schedule online.",
"han_river_evening":"The Han River parks come alive as Seoulites gather to picnic, bike, and socialize. Ordering fried chicken and beer (chimaek) for delivery to your riverside mat is a beloved tradition. Grab snacks, find a spot on the grass, and enjoy the skyline.",
"hotel_seoul":"On departure day, most Seoul hotels offer luggage storage so you can explore nearby neighborhoods. Allow at least 90 minutes for transit to Incheon Airport via AREX from Seoul Station.",
"incheon_depart":"Incheon Airport's departure is smooth with excellent duty-free shopping, Korean food courts, and cultural centers past security. Arrive 2.5–3 hours before your flight. Don't forget to claim your tax refund at the automated kiosks."
};

let currentPage=0;
const totalPages=DAYS.length+1; // days + missing page

function goPage(idx){
  idx=Math.max(0,Math.min(totalPages-1,idx));
  currentPage=idx;
  document.getElementById('pages-container').style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  // scroll active nav btn into view
  const btns=document.querySelectorAll('.nav-btn');
  if(btns[idx])btns[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function showInfo(key,title){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').textContent=DESC[key]||'No description available.';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}

function gmapsUrl(lat,lng,name){return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`}

function createNumberedIcon(n){
  return L.divIcon({className:'',html:`<div class="n-icon">${n}</div>`,iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]});
}

function buildPages(){
  const container=document.getElementById('pages-container');
  const nav=document.getElementById('nav-scroll');

  DAYS.forEach((day,idx)=>{
    // Nav button
    const btn=document.createElement('button');
    btn.className=`nav-btn ${day.navClass}`;
    btn.textContent=day.num<=12?`Day ${day.num}`:'Missing?';
    btn.onclick=()=>goPage(idx);
    nav.appendChild(btn);

    // Page
    const page=document.createElement('div');
    page.className='page';

    let html=`<div class="page-header"><span class="day-num">${day.num}</span><h2>${day.title}</h2><div class="sub">${day.date} · ${day.region}</div></div>`;

    // Transport section
    if(day.transport){
      html+=`<div class="section-box transport"><h4>🚌 Transport</h4><div class="detail">${day.transport.text}<br><span style="font-size:12px;color:#888">${day.transport.detail}</span></div></div>`;
    }

    // Map
    html+=`<div class="map-wrap"><div id="map-${day.num}" class="map"></div></div>`;

    // POI list
    html+=`<div class="poi-list">`;
    day.pois.forEach(p=>{
      let badges='';
      if(p.badge==='hike')badges=`<span class="badge badge-hike">🥾 ${p.badgeText||'Hike'}</span>`;
      else if(p.badge==='bike')badges=`<span class="badge badge-bike">🚴 ${p.badgeText||'E-Bike'}</span>`;
      else if(p.badge==='food')badges=`<span class="badge badge-food">🍽️ Restaurant</span>`;

      html+=`<div class="poi-item">
        <div class="poi-num">${p.n}</div>
        <div class="poi-body">
          ${p.time?`<span class="poi-time">${p.time}</span>`:''}
          <div class="poi-name"><a href="https://www.google.com/search?q=${p.search}" target="_blank">${p.name}</a></div>
          ${badges?`<div class="poi-badges">${badges}</div>`:''}
          <div class="poi-actions">
            <button class="poi-action-btn" onclick="showInfo('${p.key}','${p.name.replace(/'/g,"\\'")}')">ℹ️ Info</button>
            <a class="poi-action-btn gmaps" href="${gmapsUrl(p.lat,p.lng,p.name)}" target="_blank">📍 Map</a>
          </div>
        </div>
      </div>`;
    });
    html+=`</div>`;

    // Hotel section
    if(day.hotel){
      html+=`<div class="section-box hotel"><h4>🏨 Hotel</h4><div class="detail">${day.hotel}</div></div>`;
    }

    html+=`<div class="swipe-hint">← swipe or use arrows to navigate →</div>`;
    page.innerHTML=html;
    container.appendChild(page);
  });

  // Missing page
  const misBtn=document.createElement('button');
  misBtn.className='nav-btn';
  misBtn.textContent='Missing?';
  misBtn.style.borderBottom='2px solid #f39c12';
  misBtn.onclick=()=>goPage(DAYS.length);
  nav.appendChild(misBtn);

  const misPage=document.createElement('div');
  misPage.className='page';
  let mhtml=`<div class="missing-page"><h2>What We'd Be Missing</h2>`;
  MISSING.forEach(t=>{
    mhtml+=`<div class="tier-title ${t.cls}">${t.tier}</div>`;
    t.items.forEach(i=>{
      mhtml+=`<div class="m-item"><div class="m-title">${i.title}</div><div class="m-desc">${i.desc}</div></div>`;
    });
  });
  mhtml+=`</div>`;
  misPage.innerHTML=mhtml;
  container.appendChild(misPage);

  // Init maps
  setTimeout(()=>{
    DAYS.forEach(day=>{
      const m=L.map(`map-${day.num}`,{zoomControl:true,scrollWheelZoom:false}).setView([36,127.8],7);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',maxZoom:19}).addTo(m);
      const pts=[];
      day.pois.forEach(p=>{
        L.marker([p.lat,p.lng],{icon:createNumberedIcon(p.n)}).addTo(m).bindPopup(`<b>${p.n}. ${p.name.replace(/<[^>]*>/g,'')}</b>`);
        pts.push([p.lat,p.lng]);
      });
      if(pts.length>1){
        L.polyline(pts,{color:'#e74c3c',weight:3,opacity:.6,dashArray:'8,8'}).addTo(m);
        m.fitBounds(L.latLngBounds(pts).pad(.2));
      }else if(pts.length===1){
        m.setView(pts[0],13);
      }
    });
  },200);

  // Set first page active
  goPage(0);
}

// Swipe support
let touchStartX=0,touchEndX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{
  touchEndX=e.changedTouches[0].screenX;
  const diff=touchStartX-touchEndX;
  if(Math.abs(diff)>60){
    if(diff>0)goPage(currentPage+1);
    else goPage(currentPage-1);
  }
},{passive:true});
// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')goPage(currentPage+1);
  if(e.key==='ArrowLeft')goPage(currentPage-1);
  if(e.key==='Escape')closeModal();
});

document.addEventListener('DOMContentLoaded',buildPages);
</script>
