<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Korea 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#e0e0e0}
body{padding-bottom:70px;overflow-x:hidden}
@media(max-width:768px){body{padding-bottom:0}}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:2000;background:#12122aee;backdrop-filter:blur(10px);border-top:1px solid #2a2a4a;display:flex;align-items:center;height:68px;padding:0 4px}
.nav-scroll{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;padding:10px 2px;scrollbar-width:none}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 16px;border-radius:8px;font-size:14px;color:#aaa;background:#1a1a3a;white-space:nowrap;border:none;cursor:pointer;transition:all .2s;flex-shrink:0;min-height:42px}
.nav-btn.active{background:#e74c3c;color:#fff}
.nav-btn.seoul{border-bottom:2px solid #3498db}
.nav-btn.jeju{border-bottom:2px solid #2ecc71}
.nav-btn.busan{border-bottom:2px solid #e67e22}
.nav-btn.travel{border-bottom:2px solid #9b59b6}
.nav-arrow{background:none;border:none;color:#888;font-size:28px;cursor:pointer;padding:6px 10px;flex-shrink:0;min-height:42px}

/* Pages - show/hide */
.page{display:none}
.page.active{display:block}

/* Cover page */
.cover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);text-align:center;padding:40px 20px;background:linear-gradient(160deg,#1a1a3e 0%,#0f0f1a 50%,#1a1a3e 100%)}
.cover .flag{font-size:80px;margin-bottom:16px}
.cover h1{font-size:30px;color:#fff;margin-bottom:6px}
.cover .family{font-size:16px;color:#ccc;margin-bottom:4px}
.cover .dates{font-size:14px;color:#888;margin-bottom:30px}
.cover .saying{font-style:italic;color:#f5b041;font-size:15px;max-width:400px;line-height:1.6;margin-bottom:6px}
.cover .saying-kr{font-size:20px;color:#f5b041;margin-bottom:8px}
.cover .saying-credit{font-size:12px;color:#666}
.cover .route{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:30px}
.cover .rseg{background:#1e1e3a;padding:6px 14px;border-radius:20px;font-size:13px;color:#ccc}
.cover .rarr{color:#555;font-size:16px;display:flex;align-items:center}

/* Page header */
.pg-hdr{background:linear-gradient(135deg,#1a1a3e,#0f0f1a);padding:18px 16px 14px;border-bottom:1px solid #2a2a4a}
.pg-hdr .dn{display:inline-flex;align-items:center;justify-content:center;background:#e74c3c;color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;font-weight:bold;margin-right:10px;vertical-align:middle}
.pg-hdr h2{display:inline;font-size:20px;color:#fff;vertical-align:middle}
.pg-hdr .sub{color:#888;font-size:13px;margin-top:4px}

/* Tabs */
.tabs{display:flex;background:#12122a;border-bottom:1px solid #2a2a4a}
.tab-btn{flex:1;padding:12px 0;text-align:center;font-size:14px;color:#888;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:#e74c3c}
.tab-content{display:none}
.tab-content.active{display:block}

/* Map */
.map-wrap{margin:10px 12px;border-radius:12px;overflow:hidden;background:#16163a}
.map{height:280px;width:100%}
@media(min-width:768px){.map{height:400px}}

/* POI list */
.poi-list{padding:0 12px 12px}
.poi-item{display:flex;gap:10px;padding:11px;background:#16163a;border-radius:10px;margin-bottom:7px;align-items:flex-start}
.poi-num{background:#e74c3c;color:#fff;width:28px;height:28px;min-width:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;margin-top:2px}
.poi-body{flex:1;min-width:0}
.poi-time{font-size:13px;color:#888;background:#1e1e4a;display:inline-block;padding:2px 8px;border-radius:3px;margin-bottom:4px}
.poi-name{font-size:15px;color:#fff;line-height:1.5}
.poi-name a{color:#5dade2;text-decoration:none}
.poi-badges{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;color:#fff}
.badge-hike{background:#27ae60}.badge-bike{background:#2980b9}.badge-food{background:#c0392b}
.poi-actions{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.poi-action-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;font-size:13px;color:#5dade2;background:#1e1e4a;border:none;cursor:pointer;text-decoration:none}
.poi-action-btn.gmaps{color:#4ade80}

/* Tab content sections */
.tab-inner{padding:16px 12px}
.info-card{background:#16163a;border-radius:10px;padding:16px;margin-bottom:10px}
.info-card.hotel-card{border-left:3px solid #f39c12}
.info-card.transport-card{border-left:3px solid #3498db}
.info-card h4{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.info-card .detail{font-size:15px;color:#ddd;line-height:1.7}
.info-card a{color:#f5b041;text-decoration:none}
.info-card.transport-card a{color:#5dade2}
.voucher-area{margin-top:12px;padding:12px;background:#1e1e4a;border-radius:8px}
.voucher-area h5{font-size:12px;color:#888;margin-bottom:6px}
.voucher-area .placeholder{font-size:13px;color:#555;font-style:italic}
.voucher-link{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;font-size:12px;color:#2ecc71;background:#16163a;text-decoration:none;margin-top:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:3000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#1a1a3e;border-radius:14px;padding:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative;border:1px solid #2a2a5a}
.modal h3{color:#fff;font-size:17px;margin-bottom:10px;padding-right:30px}
.modal p{color:#bbb;font-size:14px;line-height:1.7}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#888;font-size:24px;cursor:pointer}

/* Missing page */
.missing-page{padding:20px 16px}
.missing-page h2{font-size:22px;color:#fff;margin-bottom:16px;border-bottom:2px solid #f39c12;padding-bottom:10px}
.tier-title{font-size:15px;margin:16px 0 10px;font-weight:bold}
.tier-title.t1{color:#e74c3c}.tier-title.t2{color:#f39c12}.tier-title.t3{color:#3498db}.tier-title.t4{color:#2ecc71}
.m-item{background:#16163a;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.m-item .m-title{font-size:14px;font-weight:bold;color:#fff;margin-bottom:4px}
.m-item .m-title a{color:#5dade2;text-decoration:none}
.m-item .m-desc{font-size:13px;color:#aaa;line-height:1.5}

/* Todo page */
.todo-page{padding:20px 16px}
.todo-page h2{font-size:22px;color:#fff;margin-bottom:16px;border-bottom:2px solid #2ecc71;padding-bottom:10px}
.todo-cat{font-size:15px;color:#2ecc71;font-weight:bold;margin:18px 0 8px}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#16163a;border-radius:10px;margin-bottom:6px}
.todo-item.done{opacity:.5}
.todo-item.done .todo-text{text-decoration:line-through}
.todo-cb{width:22px;height:22px;min-width:22px;accent-color:#2ecc71;cursor:pointer;margin-top:2px}
.todo-body{flex:1}
.todo-text{font-size:14px;color:#ddd;line-height:1.4}
.todo-when{font-size:12px;color:#888;margin-top:3px}

.ios-spacer{height:40px;min-height:40px}
@media(max-width:768px){.ios-spacer{height:10px;min-height:10px}}
.n-icon{background:#e74c3c;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)}
</style>
</head>
<body>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal"><button class="modal-close" onclick="closeModal()">×</button><h3 id="modal-title"></h3><p id="modal-body"></p></div>
</div>

<div id="app"></div>

<div class="bottom-nav">
  <button class="nav-arrow" onclick="goPage(currentPage-1)">‹</button>
  <div class="nav-scroll" id="nav-scroll"></div>
  <button class="nav-arrow" onclick="goPage(currentPage+1)">›</button>
</div>

<script>
const DESC={"incheon_airport":"Incheon International Airport (ICN) is South Korea's main gateway, consistently ranked among the world's best. It features free cultural experience zones and Korean gardens. Grab a T-money transit card at the convenience stores in arrivals — it works on subways, buses, and taxis across the country.<br><br>🎫 <b>Booking:</b> No reservation needed.","myeongdong":"Myeongdong is Seoul's premier shopping and entertainment district, packed with Korean cosmetics shops, fashion boutiques, and street food stalls. Visit in the evening when the food vendors are in full swing and the neon lights create an electric atmosphere.<br><br>🎫 <b>Booking:</b> No reservation needed.","yukjeon_hoekwan":"Yukjeon Hoekwan is a beloved Seoul restaurant famous for its bulgogi-jeongol, a simmering pot of marinated beef with vegetables and glass noodles. Operating since 1959, it's one of the city's most iconic traditional dining experiences. Arrive before peak hours as waits can be long.<br><br>🎫 <b>Booking:</b> Reservation recommended. Call +82 2-703-0019 for peak meal times. Walk-ins accepted but expect waits.","cheonggyecheon":"Cheonggyecheon is a restored 10.9km stream running through downtown Seoul, transformed from a covered highway into a peaceful urban oasis in 2005. Lined with walking paths, public art, and small waterfalls, it's beautifully illuminated at night.<br><br>🎫 <b>Booking:</b> No reservation needed.","gyeongbokgung":"Gyeongbokgung is the grandest of Seoul's Five Grand Palaces, built in 1395 as the main royal palace of the Joseon Dynasty. Its grounds include the iconic throne hall and the Gyeonghoeru Pavilion over a lotus pond. Wearing hanbok gets you free admission, and the guard changing ceremony happens multiple times daily.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets (3,000 KRW) at the gate. Free in hanbok.","bukchon":"Bukchon Hanok Village is a residential neighborhood between two palaces, famous for hundreds of traditional hanok houses with curved tile rooftops. Walking its hilly alleyways offers a glimpse into Korea's architectural heritage against a modern skyline. Keep noise down — this is still a living neighborhood.<br><br>🎫 <b>Booking:</b> No reservation needed.","myeongdong_kyoja":"Myeongdong Kyoja is a no-frills institution famous for handmade kalguksu (knife-cut noodle soup) and mandu (dumplings) since 1966. The rich savory broth and chewy noodles draw long lines. The menu is intentionally limited — just pick between noodles, dumplings, or bibimbap.<br><br>🎫 <b>Booking:</b> No reservation needed. Walk-in only; expect 10–20 min queue at meal times.","seochon":"Seochon is a charming neighborhood west of Gyeongbokgung, once home to Joseon-era artisans. Today it's filled with independent cafés, galleries, and boutiques in quiet alleyways alongside traditional hanok homes. More authentic and less touristy than nearby Bukchon.<br><br>🎫 <b>Booking:</b> No reservation needed.","ssamjigil":"Ssamjigil is a creative open-air shopping complex in Insadong with a continuous spiral walkway from ground level to the rooftop. It houses shops selling handmade crafts, traditional Korean goods, and quirky souvenirs alongside artist studios and cafés.<br><br>🎫 <b>Booking:</b> No reservation needed.","jogyesa":"Jogyesa is the chief temple of the Jogye Order of Korean Buddhism in the heart of Seoul. During Buddha's Birthday season (around May), thousands of colorful paper lanterns are strung across the temple grounds — a stunning sight that will be up during your visit.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry.","maple_tree":"Maple Tree House is one of Seoul's most acclaimed Korean BBQ restaurants in Itaewon, known for high-quality aged galbi and pork belly in a stylish setting. Reservations are strongly recommended, especially for dinner on weekends.<br><br>🎫 <b>Booking:</b> Reservation recommended. Call +82 2-790-7977 or book via AutoReserve. Walk-ins risky at dinner.","yeouido_bike":"Yeouido Park is the starting point for Seoul's Han River bike path — 40+ km of paved, car-free riverside riding with skyline views.<br><br>🧭 <b>LOGISTICS:</b> Subway Line 5 to Yeouinaru Station (Exit 2/3), 4 min walk to bike rental kiosks in Yeouido Hangang Park. Regular bikes ~3,000 won/hr; e-bikes ~5,000–10,000 won/hr. Bring passport for rental. Ride east on south bank toward Jamsil (~17 km one-way, passing Banpo Bridge), return same way. Restrooms and convenience stores every few km along the path. Bring sunscreen — mostly exposed, no shade.<br><br>🎫 <b>Booking:</b> No reservation needed for regular bikes. E-bikes: online reservation recommended (limited stock).","jamsil_bike":"The Jamsil area along the Han River, near Lotte World Tower (Korea's tallest building), makes a great turnaround point for a riverside bike ride from Yeouido. The stretch passes through several parks with facilities and scenic overlooks.<br><br>🎫 <b>Booking:</b> No reservation needed.","inwangsan":"Inwangsan (338m) is a granite peak with the restored Seoul Fortress Wall along its ridge, offering panoramic city views and passing active shamanistic shrines.<br><br>🧭 <b>LOGISTICS:</b> Start at Changuimun Gate entrance. Subway Line 3 to Gyeongbokgung Station (Exit 3), then bus 1020/7022 to Jahamun Gogae stop. No parking — take subway. Walk uphill following the fortress wall south toward Sajik Park; out-and-back or loop via Sajik-dan. Restrooms at trailhead near Changuimun Gate. Carry water — none on the ridge. No entrance fee.<br><br>🎫 <b>Booking:</b> No reservation needed. Free trail, open Tue–Sun (closed Mondays).","n_seoul_tower":"N Seoul Tower sits atop Namsan Mountain at 480m above sea level, offering 360-degree panoramic views. Built in 1969, it's the city's most recognizable landmark. Take the Namsan cable car up and visit at sunset to see Seoul transition to a sea of lights.<br><br>🎫 <b>Booking:</b> No reservation needed. Observatory tickets on-site or pre-buy on Klook/KKday for discounts.","jungsik":"Jungsik is a Michelin-starred restaurant reimagining Korean cuisine through modern fine-dining techniques. Chef Yim Jung-sik pioneered contemporary Korean gastronomy, blending traditional flavors with global culinary arts. Book well in advance for the multi-course tasting menu.<br><br>🎫 <b>Booking:</b> Advance booking required. Book via Catch Table app — slots open 1st of even months at 11 AM KST, sell out in minutes. Alternative: call +82 2-517-4654.","jeju_airport":"Jeju International Airport serves South Korea's largest island. The Gimpo–Jeju route is among the world's busiest flight corridors. Pick up your rental car here — having wheels on Jeju is essential as public transit between attractions is limited.<br><br>🎫 <b>Booking:</b> No reservation needed.","saryeoni":"Saryeoni Forest Trail is a serene, flat woodland path through cedar forest in Jeju's highlands. Accessible to all fitness levels.<br><br>⚠️ <b>WARNING:</b> This trail is typically closed Nov 1 – May 15 for ecosystem protection. Your visit is April 26 — confirm it is open before going. Check visitjeju.net or call ahead.<br><br>🧭 <b>LOGISTICS:</b> Main entrance on Road 1112 (Bijarim-ro) between Jeju City and Seogwipo. Free parking lot at entrance (limited, arrive early). Flat gravel path; standard out-and-back is ~10 km turning around at Mulchat Oreum. Hours 9 AM – 5 PM (last entry 2 PM). No fee. Restrooms at entrance only — no facilities on trail. Bring water.<br><br>🎫 <b>Booking:</b> No reservation needed (during open season). Free entry. Check if open — typically closed Nov 1 – May 15.","dombedon":"Dombedon is a popular Jeju restaurant specializing in heuk-dwaeji (Jeju black pork), a local breed prized for rich flavor and tender texture. The pork is grilled at your table with fresh local sides. Arrive early for dinner as it fills up quickly.<br><br>🎫 <b>Booking:</b> Reservation recommended for dinner. Call +82 64-753-0008. Walk-ins usually OK outside peak hours.","seongsan_port":"Seongsan Port is the departure point for ferries to Udo Island on Jeju's eastern coast. Ferries run frequently and take about 15 minutes. Bring your passport for boarding, and check the last return ferry time so you don't get stranded.<br><br>🎫 <b>Booking:</b> No advance booking. Ferry tickets bought on-site (~10,500 KRW round trip). Bring passport.","udo_island":"Udo Island is a picturesque island off Jeju's east coast — turquoise waters, coral sand beaches, peanut ice cream. E-bike is the best way to circle it.<br><br>🧭 <b>LOGISTICS:</b> Drive to Seongsanpo Ferry Terminal (next to Ilchulbong). Park in multi-story car park (~8,000 won/day). Bring passport — foreigners must show ID to buy ferry tickets (round trip ~8,500–10,500 won). Ferries every 30 min, ride is 15 min. E-bike rental shops right outside Cheonjin Port on Udo (~15,000 won/person). 15 km loop takes 1.5–2 hrs. Restrooms and cafes around the island. Catch any return ferry — no reservation needed. Check last ferry time!<br><br>🎫 <b>Booking:</b> No reservation needed. E-bike rental on arrival at Udo port.","seongsan_ilchulbong":"Seongsan Ilchulbong (Sunrise Peak) is a dramatic volcanic tuff cone rising 182m, formed by an underwater eruption 5,000 years ago. UNESCO World Heritage site.<br><br>🧭 <b>LOGISTICS:</b> Large free parking lot at the base. Tickets at the booth: 5,000 won/adult (free 65+ and under 6). Hours ~5 AM – 7 PM in April. Paved staircase straight up to crater rim; 30–50 min up, same way down. Restrooms and convenience stores at the base village. Bring water — none on trail.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (5,000 KRW). For sunrise slots: book 30 days ahead via Jeju tourism portal.","jusangjeolli":"Daepo Jusangjeolli Cliff is a striking formation of hexagonal basalt columns along Jeju's southern coast, created when lava cooled rapidly upon hitting the ocean. The geometric pillars rising from crashing waves make it one of Jeju's most photogenic sites.<br><br>🎫 <b>Booking:</b> No reservation needed. Pay on-site (2,000 KRW).","olle_trail_7":"Olle Trail Section 7 is the most scenic segment of Jeju's famous walking route along the southern coast — volcanic cliffs, tangerine orchards, villages, ocean vistas. Marked with blue and orange ribbons.<br><br>🧭 <b>LOGISTICS:</b> Start at Oedolgae Rock (free parking lot). Walk west along coast toward Wolpyeong Village (15 km full, or turn around at Hwangwooji after ~6 km for a shorter hike). Allow 4–5 hrs full / 2–3 hrs partial. Shops and cafes at the start in Seogwipo; carry water for middle sections. No fee. For one-way walk, taxi back from Wolpyeong to your car (~15 min).<br><br>🎫 <b>Booking:</b> No reservation needed. Free public trail.","osulloc":"O'sulloc Tea Museum is a sleek complex surrounded by emerald-green tea fields in Jeju's western highlands. It covers Korean tea history and offers tastings of Jeju-grown green teas and matcha desserts. Admission is free.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry.","hyeopjae":"Hyeopjae Beach features white coral sand and shallow emerald waters with views of Biyangdo Island. The gentle waves are great for wading, and black lava rocks provide dramatic contrast. Cafés and restaurants line the road behind the beach.<br><br>🎫 <b>Booking:</b> No reservation needed. Free public beach.","gimhae_airport":"Gimhae International Airport is Busan's main airport with convenient light rail connections to downtown. Smaller and easier to navigate than Incheon.<br><br>🎫 <b>Booking:</b> No reservation needed.","gamcheon":"Gamcheon Culture Village is Busan's colorful hillside community, often called the 'Machu Picchu of Busan.' Tightly packed pastel houses cascade down a slope, filled with murals, sculptures, and galleries. Wear comfortable shoes and follow the stamp-trail map.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry. Optional stamp map 2,000 KRW on-site.","haeundae":"Haeundae Beach is Busan's most famous beach, a wide crescent of sand backed by high-rise hotels. The beachfront boardwalk and surrounding alleys make it lively year-round.<br><br>🎫 <b>Booking:</b> No reservation needed. Free public beach.","amsogalbi":"Haeundae Amsogalbi-jip is a beloved Busan institution known for tender marinated beef short ribs grilled over charcoal. Pair your galbi with naengmyeon (cold noodles) for the classic combo.<br><br>🎫 <b>Booking:</b> Reservation recommended. Call +82 51-746-0033. Without reservation arrive before 4:30 PM for dinner waitlist.","igidae":"Igidae Coastal Walk is a stunning 5km cliffside trail with views of Haeundae skyline, Gwangan Bridge, and the open sea.<br><br>🧭 <b>LOGISTICS:</b> Start from Dongsaengmal (Yongho Starlight Park) entrance — taxi from Haeundae ~15 min. Small parking lot fills fast; taxi is better. Walk east along cliff path toward Oryukdo Skywalk (5 km, 2–2.5 hrs). Ends at Oryukdo Skywalk (cafe, restrooms, bus stop). Almost no facilities between endpoints — bring water. No entrance fee. Take taxi from Oryukdo back to hotel.<br><br>🎫 <b>Booking:</b> No reservation needed. Free public trail.","yonggungsa":"Haedong Yonggungsa is a rare seaside Buddhist temple on Busan's rocky coastline, built in 1376. Unlike most Korean temples in mountains, this one sits at the ocean's edge with waves crashing below. Arrive early to beat tour groups.<br><br>🎫 <b>Booking:</b> No reservation needed. Free admission. Open 5:00–20:00.","bulguksa":"Bulguksa Temple is a masterpiece of Silla-era Buddhist architecture in Gyeongju, originally built in 528. A UNESCO World Heritage Site housing several National Treasures including the Dabotap and Seokgatap stone pagodas.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (~5,000 KRW).","seokguram":"Seokguram Grotto is an 8th-century stone cave housing a magnificent seated Buddha gazing toward the East Sea. One of the finest Buddhist sculptures in the world — UNESCO World Heritage.<br><br>🧭 <b>LOGISTICS:</b> Park at Bulguksa Temple parking lot (1,000–2,000 won). Bulguksa admission is free. The forest trail to Seokguram starts behind/above the temple — 2.2 km uphill through pine forest (~1 hr up, 40 min down). Seokguram admission: 5,000 won. Restrooms at both Bulguksa and Seokguram. Bring water — no shops on forest trail. Return same way to car.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (5,000 KRW).","hwangridan":"Hwangridan-gil is Gyeongju's trendy street blending ancient heritage with hip cafés, boutiques, and restaurants in renovated hanok buildings. Ideal for dinner after temple visits.<br><br>🎫 <b>Booking:</b> No reservation needed.","wolji":"Wolji Pond (formerly Anapji) is a Silla Dynasty palace garden from 674 AD. The pond and three islands are flanked by pavilions that reflect perfectly in still water. Visit at night when illuminated — one of Korea's most magical evening scenes.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (3,000 KRW). Open until 22:00.","jagalchi":"Jagalchi Market is Korea's largest seafood market along Busan's waterfront. Upper-floor restaurants prepare fresh catches on the spot.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry.","biff":"BIFF Square honors Busan's film festival with handprints of directors and stars. The surrounding streets are packed with street food, especially hotteok (sweet stuffed pancakes).<br><br>🎫 <b>Booking:</b> No reservation needed.","blueline":"Haeundae Blueline Park features the Sky Capsule — colorful pods gliding along a coastal rail track with ocean views. Book tickets online in advance as they sell out.<br><br>🎫 <b>Booking:</b> Advance booking required. Book at bluelinepark.com 2–4 weeks ahead. Sky Capsule sells out, especially sunset slots. ~40,000–50,000 KRW per capsule (2–4 people).","gukje":"Gukje Market is one of Busan's largest traditional markets, established by Korean War refugees in 1950. A maze of covered alleys selling everything from clothing to street food.<br><br>🎫 <b>Booking:</b> No reservation needed.","busan_station":"Busan Station is the city's main KTX hub, connecting to Seoul in about 2.5 hours. Book tickets via the Korail app in advance.<br><br>🎫 <b>Booking:</b> Book KTX tickets in advance via Korail app (letskorail.com). Popular times sell out.","hongdae":"Hongdae is Seoul's youthful creative neighborhood around Hongik University, famous for indie music, street performances, and nightlife. By day: quirky shops and cafés. By night: one of Seoul's liveliest districts.<br><br>🎫 <b>Booking:</b> No reservation needed.","bukhansan":"Bukhansan National Park is a dramatic granite mountain on Seoul's northern edge. The Bukhansanseong trail follows a historic fortress wall to rugged peaks with sweeping city views.<br><br>🧭 <b>LOGISTICS:</b> Subway Line 3 to Gupabal Station (Exit 1), then bus 704 to Bukhansanseong entrance (~15 min), or taxi from Gupabal (~6,000 won). Free trail map at the Information Center. Walk north through the fortress gate toward Baegundae Peak; 6.8 km round trip. Free, no ticket. Open sunrise to sunset. Restrooms and snack shops at entrance; carry water for upper sections. Arrive early on weekends. Return same way.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry. Open sunrise to sunset.","icheon":"Icheon is Korea's center of ceramic arts, with a tradition dating to the Goryeo Dynasty. The annual Ceramic Festival showcases master potters and hands-on workshops. Also famous for some of Korea's best rice.<br><br>🎫 <b>Booking:</b> No reservation for general entry (free). Pottery workshops: book ahead as popular slots fill up.","naksan":"Naksan Park is a hilltop park on Seoul's old eastern fortress wall with panoramic views. The restored City Wall makes for a pleasant walk connecting to Ihwa Mural Village. Sunset is the best time.<br><br>🎫 <b>Booking:</b> No reservation needed. Free, open 24/7.","ihwa":"Ihwa Mural Village is an art-filled hillside neighborhood where colorful murals transform ordinary walls into an open-air gallery. Be respectful of residents.<br><br>🎫 <b>Booking:</b> No reservation needed.","gwangjang":"Gwangjang Market is Seoul's oldest traditional market (1905) and a must-visit for street food. Legendary for bindaetteok (mung bean pancakes), mayak gimbap, and yukhoe (beef tartare).<br><br>🎫 <b>Booking:</b> No reservation needed. First-come, first-served.","ddp":"Dongdaemun Design Plaza is Zaha Hadid's futuristic landmark, a hub for design exhibitions and cultural events. Striking at night with the LED rose garden illuminated.<br><br>🎫 <b>Booking:</b> No reservation for building/grounds (free). Special exhibitions may need tickets — check ddp.or.kr.","han_river_evening":"The Han River parks come alive as Seoulites gather to picnic and socialize. Ordering fried chicken and beer (chimaek) delivered to your riverside mat is a beloved tradition.<br><br>🎫 <b>Booking:</b> No reservation needed. Public parks, free and open.","hotel_seoul":"On departure day, most Seoul hotels offer luggage storage. Allow at least 90 minutes for transit to Incheon via AREX from Seoul Station.<br><br>🎫 <b>Booking:</b> No reservation needed (beyond hotel booking).","incheon_depart":"Incheon Airport's departure is smooth with excellent duty-free shopping and food courts past security. Arrive 2.5–3 hours before your flight.<br><br>🎫 <b>Booking:</b> No reservation needed beyond flight ticket. Arrive 2.5–3 hrs early.",
"dmz":"The DMZ (Demilitarized Zone) is the 4km-wide buffer between North and South Korea, one of the most heavily fortified borders on Earth. A half-day guided tour takes you to the Third Infiltration Tunnel (dug by North Korea for a surprise attack), Dora Observatory (where you look into North Korea through binoculars), and Imjingak Park. Book through a licensed tour operator 1–2 weeks ahead — you cannot visit independently. Bring your passport.<br><br>🎫 <b>Booking:</b> Advance booking required. Book through Klook, Viator, or authorized operator 3–5 days ahead. JSA/Panmunjom needs 72+ hrs and passport copy. Bring passport on tour day.",
"abijou":"Abijou Clinic in Myeongdong is one of Seoul's most popular skin clinics for tourists, with a 20-year track record and 3.5 million patients. The signature Aqua Peel facial (~$25–75, 30 min) deeply cleanses, extracts, and hydrates — you walk out glowing with zero downtime. They have 60 interpreters in 9 languages, luggage storage, and a tax refund kiosk. Both men and women of all ages do this — skincare in Korea is completely gender-neutral.<br><br>🎫 <b>Booking:</b> Advance booking required. Book via abijouclinic.com, phone 1544-0377, or Facebook Messenger. Book a few days ahead."};

let currentPage=0;
const totalPages=DAYS.length+3; // cover + 12 days + todo + missing
const mapInstances={};
const mapBounds={};

function toggleTodo(id){
  const cb=document.getElementById('cb-'+id);
  const row=document.getElementById('todo-row-'+id);
  if(cb.checked){
    localStorage.setItem('todo_'+id,'1');
    row.classList.add('done');
  }else{
    localStorage.removeItem('todo_'+id);
    row.classList.remove('done');
  }
}

function gmapsUrl(q){return `https://www.google.com/maps/search/${q.replace(/\+/g,'+')}+South+Korea`}
function showInfo(key,name){
  document.getElementById('modal-title').textContent=name.replace(/🥾|🚴/g,'').trim();
  document.getElementById('modal-body').innerHTML=DESC[key]||'No description available.';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}

function goPage(idx){
  idx=Math.max(0,Math.min(totalPages-1,idx));
  currentPage=idx;
  document.querySelectorAll('.page').forEach((p,i)=>{
    p.classList.toggle('active',i===idx);
  });
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const btns=document.querySelectorAll('.nav-btn');
  if(btns[idx])btns[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  // Fix map rendering and zoom for newly visible page
  if(idx>0 && idx<=DAYS.length){
    const dayNum=DAYS[idx-1].num;
    setTimeout(()=>{
      const m=mapInstances[dayNum];
      if(!m)return;
      m.invalidateSize();
      const b=mapBounds[dayNum];
      if(b){
        if(b.center)m.setView(b.center,b.zoom);
        else m.fitBounds(b);
      }
    },50);
  }
  window.scrollTo(0,0);
}

function switchTab(dayNum,tabName){
  document.querySelectorAll(`[data-day="${dayNum}"] .tab-btn`).forEach(b=>b.classList.toggle('active',b.dataset.tab===tabName));
  document.querySelectorAll(`[data-day="${dayNum}"] .tab-content`).forEach(c=>c.classList.toggle('active',c.dataset.tab===tabName));
  if(tabName==='itinerary'){
    setTimeout(()=>{
      const m=mapInstances[dayNum];
      if(!m)return;
      m.invalidateSize();
      const b=mapBounds[dayNum];
      if(b){
        if(b.center)m.setView(b.center,b.zoom);
        else m.fitBounds(b);
      }
    },50);
  }
}

function build(){
  const app=document.getElementById('app');
  const nav=document.getElementById('nav-scroll');

  // === COVER PAGE ===
  const cover=document.createElement('div');
  cover.className='page active';
  cover.innerHTML=`<div class="cover">
    <div class="flag">🇰🇷</div>
    <h1>Yaniv Family in South Korea</h1>
    <div class="family">Eran · Michal · Jonathan · Ophir</div>
    <div class="dates">April 23 – May 4, 2026 · 12 Days</div>
    <div class="saying-kr">가는 말이 고와야 오는 말이 곱다</div>
    <div class="saying">"If the outgoing words are beautiful,<br>the incoming words will be beautiful too."</div>
    <div class="saying-credit">— Korean proverb</div>
    <div class="route">
      <span class="rseg">Seoul (3N)</span><span class="rarr">✈</span>
      <span class="rseg">Jeju (3N)</span><span class="rarr">✈</span>
      <span class="rseg">Busan (2N)</span><span class="rarr">🚄</span>
      <span class="rseg">Seoul (3N)</span>
    </div>
  </div>`;
  app.appendChild(cover);
  const coverBtn=document.createElement('button');
  coverBtn.className='nav-btn active';coverBtn.textContent='Home';coverBtn.onclick=()=>goPage(0);
  nav.appendChild(coverBtn);

  // === DAY PAGES ===
  DAYS.forEach((day,idx)=>{
    const btn=document.createElement('button');
    btn.className=`nav-btn ${day.nc}`;btn.textContent=`Day ${day.num}`;btn.onclick=()=>goPage(idx+1);
    nav.appendChild(btn);

    const page=document.createElement('div');
    page.className='page';
    page.dataset.day=day.num;

    // Header
    let h=`<div class="pg-hdr"><span class="dn">${day.num}</span><h2>${day.title}</h2><div class="sub">${day.date} · ${day.region}</div></div>`;

    // Tabs
    h+=`<div class="tabs">
      <button class="tab-btn active" data-tab="itinerary" onclick="switchTab(${day.num},'itinerary')">📍 Itinerary</button>
      <button class="tab-btn" data-tab="hotel" onclick="switchTab(${day.num},'hotel')">🏨 Hotel</button>
      <button class="tab-btn" data-tab="transport" onclick="switchTab(${day.num},'transport')">🚌 Transport</button>
    </div>`;

    // Tab: Itinerary
    h+=`<div class="tab-content active" data-tab="itinerary">`;
    h+=`<div class="map-wrap"><div id="map-${day.num}" class="map"></div></div>`;
    h+=`<div class="poi-list">`;
    day.pois.forEach(p=>{
      let badges='';
      if(p.badge==='hike')badges=`<span class="badge badge-hike">🥾 ${p.bt||'Hike'}</span>`;
      else if(p.badge==='bike')badges=`<span class="badge badge-bike">🚴 ${p.bt||'E-Bike'}</span>`;
      else if(p.badge==='food')badges=`<span class="badge badge-food">🍽️</span>`;
      const cleanName=p.name.replace(/🥾|🚴/g,'').trim();
      h+=`<div class="poi-item"><div class="poi-num">${p.n}</div><div class="poi-body">
        ${p.time?`<span class="poi-time">${p.time}</span>`:''}
        <div class="poi-name"><a href="https://duckduckgo.com/?q=${p.q}" target="_blank" rel="noopener">${p.name}</a></div>
        ${badges?`<div class="poi-badges">${badges}</div>`:''}
        <div class="poi-actions">
          <button class="poi-action-btn" onclick="showInfo('${p.key}','${cleanName.replace(/'/g,"\\'")}')">ℹ️ Info</button>
          <a class="poi-action-btn gmaps" href="${gmapsUrl(p.q)}" target="_blank" rel="noopener">📍 Map</a>
        </div></div></div>`;
    });
    if(day.rain){
      h+=`<div style="margin:10px 12px;padding:12px 14px;background:#2d1a00;border-left:3px solid #e67e22;border-radius:8px;font-size:13px;color:#f0c040">🌧️ <strong>Rainy day?</strong> ${day.rain}</div>`;
    }
    h+=`<div style="height:20px"></div></div></div>`;

    // Tab: Hotel
    h+=`<div class="tab-content" data-tab="hotel"><div class="tab-inner">`;
    if(day.hotel){
      h+=`<div class="info-card hotel-card"><h4>🏨 Accommodation</h4><div class="detail">${day.hotel.text}</div>
        <div class="voucher-area"><h5>📎 Booking Confirmation</h5><div class="placeholder">No voucher uploaded yet</div></div></div>`;
    }else{
      h+=`<div class="info-card hotel-card"><h4>🏨 Accommodation</h4><div class="detail">No hotel needed (departure day)</div></div>`;
    }
    h+=`</div></div>`;

    // Tab: Transport
    h+=`<div class="tab-content" data-tab="transport"><div class="tab-inner">`;
    if(day.transport){
      h+=`<div class="info-card transport-card"><h4>🚌 Transport</h4><div class="detail"><strong>${day.transport.text}</strong><br><span style="color:#888">${day.transport.detail}</span></div>
        <div class="voucher-area"><h5>📎 Tickets / Confirmation</h5><div class="placeholder">No voucher uploaded yet</div></div></div>`;
    }else{
      h+=`<div class="info-card transport-card"><h4>🚌 Transport</h4><div class="detail">No major transport — local subway/taxi in ${day.region}</div></div>`;
    }
    h+=`</div></div>`;

    // iOS Safari spacer - must be a direct child of page, outside tab-content
    h+=`<div class="ios-spacer" class="ios-spacer" style="width:100%;display:block" aria-hidden="true">&nbsp;</div>`;
    page.innerHTML=h;
    app.appendChild(page);
  });

  // === TODO PAGE ===
  const todoBtn=document.createElement('button');
  todoBtn.className='nav-btn';todoBtn.textContent='To-Do';todoBtn.style.borderBottom='2px solid #2ecc71';
  todoBtn.onclick=()=>goPage(DAYS.length+1);
  nav.appendChild(todoBtn);

  const todoPage=document.createElement('div');
  todoPage.className='page';
  let th=`<div class="todo-page"><h2>✅ Reservations & To-Do</h2>`;
  TODOS.forEach(cat=>{
    th+=`<div class="todo-cat">${cat.cat}</div>`;
    cat.items.forEach(item=>{
      const checked=localStorage.getItem('todo_'+item.id)==='1';
      th+=`<div class="todo-item ${checked?'done':''}" id="todo-row-${item.id}">
        <input type="checkbox" class="todo-cb" id="cb-${item.id}" ${checked?'checked':''} onchange="toggleTodo('${item.id}')">
        <div class="todo-body">
          <div class="todo-text">${item.text}</div>
          <div class="todo-when">⏰ ${item.when}</div>
        </div>
      </div>`;
    });
  });
  th+=`</div>`;
  th+=`<div class="ios-spacer" style="width:100%;display:block" aria-hidden="true">&nbsp;</div>`;
  todoPage.innerHTML=th;
  app.appendChild(todoPage);

  // === MISSING PAGE ===
  const misBtn=document.createElement('button');
  misBtn.className='nav-btn';misBtn.textContent='Missing?';misBtn.style.borderBottom='2px solid #f39c12';
  misBtn.onclick=()=>goPage(DAYS.length+2);
  nav.appendChild(misBtn);

  const misPage=document.createElement('div');
  misPage.className='page';
  let mh=`<div class="missing-page"><h2>What We'd Be Missing</h2>`;
  MISSING.forEach(t=>{
    mh+=`<div class="tier-title ${t.cls}">${t.tier}</div>`;
    t.items.forEach(i=>mh+=`<div class="m-item"><div class="m-title">${i.t}</div><div class="m-desc">${i.d}</div></div>`);
  });
  mh+=`</div>`;
  mh+=`<div style="height:40px;min-height:40px;width:100%;display:block" aria-hidden="true">&nbsp;</div>`;
  misPage.innerHTML=mh;
  app.appendChild(misPage);

  // Init maps
  setTimeout(()=>{
    DAYS.forEach(day=>{
      const el=document.getElementById(`map-${day.num}`);
      if(!el)return;
      const m=L.map(el,{zoomControl:true,scrollWheelZoom:false}).setView([36,127.8],7);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',maxZoom:19}).addTo(m);
      mapInstances[day.num]=m;
      const pts=[];
      day.pois.forEach(p=>{
        const icon=L.divIcon({className:'',html:`<div class="n-icon">${p.n}</div>`,iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]});
        L.marker([p.lat,p.lng],{icon}).addTo(m).bindPopup(`<b>${p.n}. ${p.name.replace(/<[^>]*>/g,'').replace(/🥾|🚴/g,'')}</b>`);
        pts.push([p.lat,p.lng]);
      });
      if(pts.length>1){
        // route line removed by request
        const b=L.latLngBounds(pts).pad(.2);
        mapBounds[day.num]=b;
        m.fitBounds(b);
      }else if(pts.length===1){
        mapBounds[day.num]={center:pts[0],zoom:13};
        m.setView(pts[0],13);
      }
    });
  },100);
}

// Swipe
let tx=0,swipeOk=true;
document.addEventListener('touchstart',e=>{
  // Don't swipe if touching the map or nav
  const t=e.target;
  swipeOk=!t.closest('.map-wrap')&&!t.closest('.bottom-nav')&&!t.closest('.leaflet-container');
  tx=e.changedTouches[0].screenX;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!swipeOk)return;
  const d=tx-e.changedTouches[0].screenX;
  if(Math.abs(d)>80){d>0?goPage(currentPage+1):goPage(currentPage-1)}
},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goPage(currentPage+1);if(e.key==='ArrowLeft')goPage(currentPage-1);if(e.key==='Escape')closeModal()});

document.addEventListener('DOMContentLoaded',build);
</script>
