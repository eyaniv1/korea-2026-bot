<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Korea 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#e0e0e0}
body{padding-bottom:70px;overflow-x:hidden;opacity:0;transition:opacity 0.2s}
@media(max-width:768px){body{padding-bottom:0}}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:2000;background:#12122aee;backdrop-filter:blur(10px);border-top:1px solid #2a2a4a;display:flex;align-items:center;height:68px;padding:0 4px}
.nav-scroll{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;padding:10px 2px;scrollbar-width:none}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 16px;border-radius:8px;font-size:14px;color:#aaa;background:#1a1a3a;white-space:nowrap;border:none;cursor:pointer;transition:all .2s;flex-shrink:0;min-height:42px}
.nav-btn.active{background:#e74c3c;color:#fff}
.nav-btn.seoul{border-bottom:2px solid #3498db}
.nav-btn.jeju{border-bottom:2px solid #2ecc71}
.nav-btn.busan{border-bottom:2px solid #e67e22}
.nav-btn.travel{border-bottom:2px solid #9b59b6}
.nav-arrow{background:none;border:none;color:#888;font-size:28px;cursor:pointer;padding:6px 10px;flex-shrink:0;min-height:42px}

/* Pages - show/hide */
.page{display:none}
.page.active{display:block}

/* Cover page */
.cover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);text-align:center;padding:40px 20px;background:linear-gradient(160deg,#1a1a3e 0%,#0f0f1a 50%,#1a1a3e 100%)}
.cover .flag{font-size:80px;margin-bottom:16px}
.cover h1{font-size:30px;color:#fff;margin-bottom:6px}
.cover .family{font-size:16px;color:#ccc;margin-bottom:4px}
.cover .dates{font-size:14px;color:#888;margin-bottom:30px}
.cover .saying{font-style:italic;color:#f5b041;font-size:15px;max-width:400px;line-height:1.6;margin-bottom:6px}
.cover .saying-kr{font-size:20px;color:#f5b041;margin-bottom:8px}
.cover .saying-credit{font-size:12px;color:#666}
.cover .route{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:30px}
.cover .rseg{background:#1e1e3a;padding:6px 14px;border-radius:20px;font-size:13px;color:#ccc}
.cover .rarr{color:#555;font-size:16px;display:flex;align-items:center}

/* Page header */
.pg-hdr{background:linear-gradient(135deg,#1a1a3e,#0f0f1a);padding:18px 16px 14px;border-bottom:1px solid #2a2a4a}
.pg-hdr .dn{display:inline-flex;align-items:center;justify-content:center;background:#e74c3c;color:#fff;padding:6px 12px;height:38px;border-radius:10px;font-size:16px;font-weight:bold;margin-right:10px;vertical-align:middle;white-space:nowrap}
.pg-hdr h2{display:inline;font-size:20px;color:#fff;vertical-align:middle}
.pg-hdr .sub{color:#888;font-size:13px;margin-top:4px}

/* Tabs */
.tabs{display:flex;background:#12122a;border-bottom:1px solid #2a2a4a}
.tab-btn{flex:1;padding:12px 0;text-align:center;font-size:14px;color:#888;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:#e74c3c}
.tab-content{display:none}
.tab-content.active{display:block}

/* Map */
.map-wrap{margin:10px 12px;border-radius:12px;overflow:hidden;background:#16163a}
.map{height:280px;width:100%}
@media(min-width:768px){.map{height:400px}}

/* POI list */
.poi-list{padding:0 12px 12px}
.poi-item{display:flex;gap:10px;padding:11px;background:#16163a;border-radius:10px;margin-bottom:7px;align-items:flex-start}
.poi-num{background:#e74c3c;color:#fff;width:28px;height:28px;min-width:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;margin-top:2px}
.poi-body{flex:1;min-width:0}
.poi-time{font-size:13px;color:#888;background:#1e1e4a;display:inline-block;padding:2px 8px;border-radius:3px;margin-bottom:4px}
.poi-name{font-size:15px;color:#fff;line-height:1.5}
.poi-name a{color:#5dade2;text-decoration:none}
.poi-badges{margin-top:4px;display:flex;flex-wrap:wrap;gap:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;color:#fff}
.badge-hike{background:#27ae60}.badge-bike{background:#2980b9}.badge-food{background:#c0392b}
.poi-actions{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.poi-action-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;font-size:13px;color:#5dade2;background:#1e1e4a;border:none;cursor:pointer;text-decoration:none}
.poi-action-btn.gmaps{color:#4ade80}

/* Tab content sections */
.tab-inner{padding:16px 12px}
.info-card{background:#16163a;border-radius:10px;padding:16px;margin-bottom:10px}
.info-card.hotel-card{border-left:3px solid #f39c12}
.info-card.transport-card{border-left:3px solid #3498db}
.info-card h4{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.info-card .detail{font-size:15px;color:#ddd;line-height:1.7}
.info-card a{color:#f5b041;text-decoration:none}
.info-card.transport-card a{color:#5dade2}
.voucher-area{margin-top:12px;padding:12px;background:#1e1e4a;border-radius:8px}
.voucher-area h5{font-size:12px;color:#888;margin-bottom:6px}
.voucher-area .placeholder{font-size:13px;color:#555;font-style:italic}
.voucher-link{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;font-size:12px;color:#2ecc71;background:#16163a;text-decoration:none;margin-top:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:3000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#1a1a3e;border-radius:14px;padding:20px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative;border:1px solid #2a2a5a}
.modal h3{color:#fff;font-size:17px;margin-bottom:10px;padding-right:30px}
.modal p{color:#bbb;font-size:14px;line-height:1.7}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#888;font-size:24px;cursor:pointer}

/* Missing page */
.missing-page{padding:20px 16px}
.missing-page h2{font-size:22px;color:#fff;margin-bottom:16px;border-bottom:2px solid #f39c12;padding-bottom:10px}
.tier-title{font-size:15px;margin:16px 0 10px;font-weight:bold}
.tier-title.t1{color:#e74c3c}.tier-title.t2{color:#f39c12}.tier-title.t3{color:#3498db}.tier-title.t4{color:#2ecc71}
.m-item{background:#16163a;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.m-item .m-title{font-size:14px;font-weight:bold;color:#fff;margin-bottom:4px}
.m-item .m-title a{color:#5dade2;text-decoration:none}
.m-item .m-desc{font-size:13px;color:#aaa;line-height:1.5}

/* Todo page */
.todo-page{padding:20px 16px}
.todo-page h2{font-size:22px;color:#fff;margin-bottom:16px;border-bottom:2px solid #2ecc71;padding-bottom:10px}
.todo-cat{font-size:15px;color:#2ecc71;font-weight:bold;margin:18px 0 8px}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:#16163a;border-radius:10px;margin-bottom:6px}
.todo-item.done{opacity:.5}
.todo-item.done .todo-text{text-decoration:line-through}
.todo-cb{width:22px;height:22px;min-width:22px;accent-color:#2ecc71;cursor:pointer;margin-top:2px}
.todo-body{flex:1}
.todo-text{font-size:14px;color:#ddd;line-height:1.4}
.todo-when{font-size:12px;color:#888;margin-top:3px}

.ios-spacer{height:40px;min-height:40px}
@media(max-width:768px){.ios-spacer{height:10px;min-height:10px}}
.n-icon{background:#e74c3c;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)}

/* Chat bubble */
.chat-fab{position:fixed;bottom:76px;right:16px;z-index:1500;width:52px;height:52px;border-radius:50%;background:#e74c3c;color:#fff;border:none;cursor:pointer;font-size:24px;box-shadow:0 4px 12px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.chat-fab:active{transform:scale(.9)}
.chat-panel{position:fixed;bottom:0;right:0;left:0;z-index:2500;height:70vh;max-height:600px;background:#0a1628;border-top:2px solid #3498db;border-radius:16px 16px 0 0;display:none;flex-direction:column;box-shadow:0 -4px 20px rgba(0,0,0,.7)}
.chat-panel.open{display:flex}
@media(min-width:768px){.chat-panel{left:auto;width:400px;right:16px;border-radius:16px;bottom:0;border:1px solid #2a2a4a}}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:2px solid #3498db;flex-shrink:0;background:#0d1f3c}
.chat-header h3{font-size:15px;color:#fff}
.chat-close{background:none;border:none;color:#888;font-size:22px;cursor:pointer}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;background:#060e1a}
.chat-msg{margin-bottom:10px;max-width:85%}
.chat-msg.bot{margin-right:auto}
.chat-msg.user{margin-left:auto}
.chat-msg .bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.chat-msg.bot .bubble{background:#1e1e4a;color:#ddd;border-bottom-left-radius:4px}
.chat-msg.user .bubble{background:#e74c3c;color:#fff;border-bottom-right-radius:4px}
.chat-msg .bubble a{color:#5dade2}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #1a3050;flex-shrink:0;background:#0a1628}
.chat-input{flex:1;background:#1e1e4a;border:1px solid #2a2a5a;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none;resize:none;font-family:inherit}
.chat-input::placeholder{color:#555}
.chat-send{background:#e74c3c;border:none;border-radius:10px;padding:10px 16px;color:#fff;font-size:14px;cursor:pointer;flex-shrink:0}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-photo-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:10px 4px;flex-shrink:0}
.chat-img-preview{margin:6px 12px;position:relative;display:none}
.chat-img-preview img{max-height:120px;border-radius:8px;border:1px solid #2a2a5a}
.chat-img-preview .remove-img{position:absolute;top:-6px;right:-6px;background:#e74c3c;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-msg .bubble img{max-width:100%;border-radius:8px;margin-bottom:6px}
.chat-typing{padding:8px 16px;font-size:12px;color:#888;font-style:italic;display:none}
.chat-typing.show{display:block}
</style>
</head>
<body>

<!-- Chat bubble & panel -->
<button class="chat-fab" id="chat-fab" onclick="toggleChat()">💬</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <h3>🤖 Trip Assistant</h3>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-msg bot"><div class="bubble">Hi! I'm your Korea trip assistant. Ask me anything — directions, restaurants, translations, or trip questions.</div></div>
  </div>
  <div class="chat-img-preview" id="chat-img-preview"><img id="chat-img-thumb"><button class="remove-img" onclick="clearChatImage()">✕</button></div>
  <div class="chat-typing" id="chat-typing">Thinking...</div>
  <div class="chat-input-row">
    <button class="chat-photo-btn" onclick="document.getElementById('chat-file').click()">📷</button>
    <input type="file" id="chat-file" accept="image/*" style="display:none" onchange="handleChatImage(this)">
    <input type="text" class="chat-input" id="chat-input" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
    <button class="chat-send" id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal"><button class="modal-close" onclick="closeModal()">×</button><h3 id="modal-title"></h3><p id="modal-body"></p></div>
</div>

<div id="app"></div>

<div class="bottom-nav">
  <button class="nav-arrow" onclick="goPage(currentPage-1)">‹</button>
  <div class="nav-scroll" id="nav-scroll"></div>
  <button class="nav-arrow" onclick="goPage(currentPage+1)">›</button>
</div>

<script>
const DESC={"incheon_airport":"Incheon International Airport (ICN) is South Korea's main gateway, consistently ranked among the world's best. It features free cultural experience zones and Korean gardens. Grab a T-money transit card at the convenience stores in arrivals — it works on subways, buses, and taxis across the country.<br><br>🎫 <b>Booking:</b> No reservation needed.","myeongdong":"Myeongdong is Seoul's premier shopping and entertainment district, packed with Korean cosmetics shops, fashion boutiques, and street food stalls. Visit in the evening when the food vendors are in full swing and the neon lights create an electric atmosphere.<br><br>🎫 <b>Booking:</b> No reservation needed.","yukjeon_hoekwan":"Yukjeon Hoekwan is a beloved Seoul restaurant famous for its bulgogi-jeongol, a simmering pot of marinated beef with vegetables and glass noodles. Operating since 1959, it's one of the city's most iconic traditional dining experiences. Arrive before peak hours as waits can be long.<br><br>🎫 <b>Booking:</b> Reservation recommended. Call +82 2-703-0019 for peak meal times. Walk-ins accepted but expect waits.","cheonggyecheon":"Cheonggyecheon is a restored 10.9km stream running through downtown Seoul, transformed from a covered highway into a peaceful urban oasis in 2005. Lined with walking paths, public art, and small waterfalls, it's beautifully illuminated at night.<br><br>🎫 <b>Booking:</b> No reservation needed.","gyeongbokgung":"Gyeongbokgung is the grandest of Seoul's Five Grand Palaces, built in 1395 as the main royal palace of the Joseon Dynasty. Its grounds include the iconic throne hall and the Gyeonghoeru Pavilion over a lotus pond. Wearing hanbok gets you free admission, and the guard changing ceremony happens multiple times daily.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets (3,000 KRW) at the gate. Free in hanbok.","bukchon":"Bukchon Hanok Village is a residential neighborhood between two palaces, famous for hundreds of traditional hanok houses with curved tile rooftops. Walking its hilly alleyways offers a glimpse into Korea's architectural heritage against a modern skyline. Keep noise down — this is still a living neighborhood.<br><br>🎫 <b>Booking:</b> No reservation needed.","myeongdong_kyoja":"Myeongdong Kyoja is a no-frills institution famous for handmade kalguksu (knife-cut noodle soup) and mandu (dumplings) since 1966. The rich savory broth and chewy noodles draw long lines. The menu is intentionally limited — just pick between noodles, dumplings, or bibimbap.<br><br>🎫 <b>Booking:</b> No reservation needed. Walk-in only; expect 10–20 min queue at meal times.","seochon":"Seochon is a charming neighborhood west of Gyeongbokgung, once home to Joseon-era artisans. Today it's filled with independent cafés, galleries, and boutiques in quiet alleyways alongside traditional hanok homes. More authentic and less touristy than nearby Bukchon.<br><br>🎫 <b>Booking:</b> No reservation needed.","ssamjigil":"Ssamjigil is a creative open-air shopping complex in Insadong with a continuous spiral walkway from ground level to the rooftop. It houses shops selling handmade crafts, traditional Korean goods, and quirky souvenirs alongside artist studios and cafés.<br><br>🎫 <b>Booking:</b> No reservation needed.","jogyesa":"Jogyesa is the chief temple of the Jogye Order of Korean Buddhism in the heart of Seoul. During Buddha's Birthday season (around May), thousands of colorful paper lanterns are strung across the temple grounds — a stunning sight that will be up during your visit.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry.","maple_tree":"Maple Tree House is one of Seoul's most acclaimed Korean BBQ restaurants in Itaewon, known for high-quality aged galbi and pork belly in a stylish setting. Reservations are strongly recommended, especially for dinner on weekends.<br><br>🎫 <b>Booking:</b> Reservation recommended. Call +82 2-790-7977 or book via AutoReserve. Walk-ins risky at dinner.","yeouido_bike":"Yeouido Park is the starting point for Seoul's Han River bike path — 40+ km of paved, car-free riverside riding with skyline views.<br><br>🧭 <b>LOGISTICS:</b> Subway Line 5 to Yeouinaru Station (Exit 2/3), 4 min walk to bike rental kiosks in Yeouido Hangang Park. Regular bikes ~3,000 won/hr; e-bikes ~5,000–10,000 won/hr. Bring passport for rental. Ride east on south bank toward Jamsil (~17 km one-way, passing Banpo Bridge), return same way. Restrooms and convenience stores every few km along the path. Bring sunscreen — mostly exposed, no shade.<br><br>🎫 <b>Booking:</b> No reservation needed for regular bikes. E-bikes: online reservation recommended (limited stock).","jamsil_bike":"The Jamsil area along the Han River, near Lotte World Tower (Korea's tallest building), makes a great turnaround point for a riverside bike ride from Yeouido. The stretch passes through several parks with facilities and scenic overlooks.<br><br>🎫 <b>Booking:</b> No reservation needed.","inwangsan":"Inwangsan (338m) is a granite peak with the restored Seoul Fortress Wall along its ridge, offering panoramic city views and passing active shamanistic shrines.<br><br>🧭 <b>LOGISTICS:</b> Start at Changuimun Gate entrance. Subway Line 3 to Gyeongbokgung Station (Exit 3), then bus 1020/7022 to Jahamun Gogae stop. No parking — take subway. Walk uphill following the fortress wall south toward Sajik Park; out-and-back or loop via Sajik-dan. Restrooms at trailhead near Changuimun Gate. Carry water — none on the ridge. No entrance fee.<br><br>🎫 <b>Booking:</b> No reservation needed. Free trail, open Tue–Sun (closed Mondays).","n_seoul_tower":"N Seoul Tower sits atop Namsan Mountain at 480m above sea level, offering 360-degree panoramic views of Seoul.<br><br>🧭 <b>PLAN:</b> Take the Namsan Cable Car up at ~5:30 PM. Enjoy daytime city views first, then watch sunset (~7:10 PM on Apr 25). Stay to see Seoul light up at night — the best part. Head down by ~7:30 PM. Jungsik dinner is ~20 min away by taxi.<br><br>🎫 <b>Booking:</b> No reservation needed. Observatory tickets on-site or pre-buy on Klook/KKday for discounts.","jungsik":"Jungsik is a Michelin-starred restaurant reimagining Korean cuisine through modern fine-dining techniques. Chef Yim Jung-sik pioneered contemporary Korean gastronomy, blending traditional flavors with global culinary arts. Book well in advance for the multi-course tasting menu.<br><br>🎫 <b>Booking:</b> Advance booking required. Book via Catch Table app — slots open 1st of even months at 11 AM KST, sell out in minutes. Alternative: call +82 2-517-4654.","jeju_airport":"Jeju International Airport serves South Korea's largest island. The Gimpo–Jeju route is among the world's busiest flight corridors. Pick up your rental car here — having wheels on Jeju is essential as public transit between attractions is limited.<br><br>🎫 <b>Booking:</b> No reservation needed.","saryeoni":"Saryeoni Forest Trail is a serene, flat woodland path through cedar forest in Jeju's highlands. Accessible to all fitness levels.<br><br>⚠️ <b>WARNING:</b> This trail is typically closed Nov 1 – May 15 for ecosystem protection. Your visit is April 26 — confirm it is open before going. Check visitjeju.net or call ahead.<br><br>🧭 <b>LOGISTICS:</b> Main entrance on Road 1112 (Bijarim-ro) between Jeju City and Seogwipo. Free parking lot at entrance (limited, arrive early). Flat gravel path; standard out-and-back is ~10 km turning around at Mulchat Oreum. Hours 9 AM – 5 PM (last entry 2 PM). No fee. Restrooms at entrance only — no facilities on trail. Bring water.<br><br>🎫 <b>Booking:</b> No reservation needed (during open season). Free entry. Check if open — typically closed Nov 1 – May 15.","dombedon":"Dombedon is a popular Jeju restaurant specializing in heuk-dwaeji (Jeju black pork), a local breed prized for rich flavor and tender texture. The pork is grilled at your table with fresh local sides. Arrive early for dinner as it fills up quickly.<br><br>🎫 <b>Booking:</b> Reservation recommended for dinner. Call +82 64-753-0008. Walk-ins usually OK outside peak hours.","seongsan_port":"Seongsan Port is the departure point for ferries to Udo Island on Jeju's eastern coast. Ferries run frequently and take about 15 minutes. Bring your passport for boarding, and check the last return ferry time so you don't get stranded.<br><br>🎫 <b>Booking:</b> No advance booking. Ferry tickets bought on-site (~10,500 KRW round trip). Bring passport.","udo_island":"Udo Island is a picturesque island off Jeju's east coast — turquoise waters, coral sand beaches, peanut ice cream. E-bike is the best way to circle it.<br><br>🧭 <b>LOGISTICS:</b> Drive to Seongsanpo Ferry Terminal (next to Ilchulbong). Park in multi-story car park (~8,000 won/day). Bring passport — foreigners must show ID to buy ferry tickets (round trip ~8,500–10,500 won). Ferries every 30 min, ride is 15 min. E-bike rental shops right outside Cheonjin Port on Udo (~15,000 won/person). 15 km loop takes 1.5–2 hrs. Restrooms and cafes around the island. Catch any return ferry — no reservation needed. Check last ferry time!<br><br>🎫 <b>Booking:</b> No reservation needed. E-bike rental on arrival at Udo port.","seongsan_ilchulbong":"Seongsan Ilchulbong (Sunrise Peak) is a dramatic volcanic tuff cone rising 182m, formed by an underwater eruption 5,000 years ago. UNESCO World Heritage site.<br><br>🧭 <b>LOGISTICS:</b> Large free parking lot at the base. Tickets at the booth: 5,000 won/adult (free 65+ and under 6). Hours ~5 AM – 7 PM in April. Paved staircase straight up to crater rim; 30–50 min up, same way down. Restrooms and convenience stores at the base village. Bring water — none on trail.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (5,000 KRW). For sunrise slots: book 30 days ahead via Jeju tourism portal.","jusangjeolli":"Daepo Jusangjeolli Cliff is a striking formation of hexagonal basalt columns along Jeju's southern coast, created when lava cooled rapidly upon hitting the ocean. The geometric pillars rising from crashing waves make it one of Jeju's most photogenic sites.<br><br>🎫 <b>Booking:</b> No reservation needed. Pay on-site (2,000 KRW).","olle_trail_7":"Olle Trail Section 7 is the most scenic segment of Jeju's famous walking route along the southern coast — volcanic cliffs, tangerine orchards, villages, ocean vistas. Marked with blue and orange ribbons.<br><br>🧭 <b>LOGISTICS:</b> Start at Oedolgae Rock (free parking lot). Walk west along coast toward Wolpyeong Village (15 km full, or turn around at Hwangwooji after ~6 km for a shorter hike). Allow 4–5 hrs full / 2–3 hrs partial. Shops and cafes at the start in Seogwipo; carry water for middle sections. No fee. For one-way walk, taxi back from Wolpyeong to your car (~15 min).<br><br>🎫 <b>Booking:</b> No reservation needed. Free public trail.","osulloc":"O'sulloc Tea Museum is a sleek complex surrounded by emerald-green tea fields in Jeju's western highlands. It covers Korean tea history and offers tastings of Jeju-grown green teas and matcha desserts. Admission is free.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry.","hyeopjae":"Hyeopjae Beach features white coral sand and shallow emerald waters with views of Biyangdo Island. The gentle waves are great for wading, and black lava rocks provide dramatic contrast. Cafés and restaurants line the road behind the beach.<br><br>🎫 <b>Booking:</b> No reservation needed. Free public beach.","gimhae_airport":"Gimhae International Airport is Busan's main airport with convenient light rail connections to downtown. Smaller and easier to navigate than Incheon.<br><br>🎫 <b>Booking:</b> No reservation needed.","gamcheon":"Gamcheon Culture Village is Busan's colorful hillside community, often called the 'Machu Picchu of Busan.' Tightly packed pastel houses cascade down a slope, filled with murals, sculptures, and galleries. Wear comfortable shoes and follow the stamp-trail map.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry. Optional stamp map 2,000 KRW on-site.","haeundae":"Haeundae Beach is Busan's most famous beach, a wide crescent of sand backed by high-rise hotels. The beachfront boardwalk and surrounding alleys make it lively year-round.<br><br>🎫 <b>Booking:</b> No reservation needed. Free public beach.","amsogalbi":"Haeundae Amsogalbi-jip is a beloved Busan institution known for tender marinated beef short ribs grilled over charcoal. Pair your galbi with naengmyeon (cold noodles) for the classic combo.<br><br>🎫 <b>Booking:</b> Reservation recommended. Call +82 51-746-0033. Without reservation arrive before 4:30 PM for dinner waitlist.","igidae":"Igidae Coastal Walk is a stunning 5km cliffside trail with views of Haeundae skyline, Gwangan Bridge, and the open sea.<br><br>🧭 <b>LOGISTICS:</b> Start from Dongsaengmal (Yongho Starlight Park) entrance — taxi from Haeundae ~15 min. Small parking lot fills fast; taxi is better. Walk east along cliff path toward Oryukdo Skywalk (5 km, 2–2.5 hrs). Ends at Oryukdo Skywalk (cafe, restrooms, bus stop). Almost no facilities between endpoints — bring water. No entrance fee. Take taxi from Oryukdo back to hotel.<br><br>🎫 <b>Booking:</b> No reservation needed. Free public trail.","yonggungsa":"Haedong Yonggungsa is a rare seaside Buddhist temple on Busan's rocky coastline, built in 1376. Unlike most Korean temples in mountains, this one sits at the ocean's edge with waves crashing below. Arrive early to beat tour groups.<br><br>🎫 <b>Booking:</b> No reservation needed. Free admission. Open 5:00–20:00.","bulguksa":"Bulguksa Temple is a masterpiece of Silla-era Buddhist architecture in Gyeongju, originally built in 528. A UNESCO World Heritage Site housing several National Treasures including the Dabotap and Seokgatap stone pagodas.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (~5,000 KRW).","seokguram":"Seokguram Grotto is an 8th-century stone cave housing a magnificent seated Buddha gazing toward the East Sea. One of the finest Buddhist sculptures in the world — UNESCO World Heritage.<br><br>🧭 <b>LOGISTICS:</b> Park at Bulguksa Temple parking lot (1,000–2,000 won). Bulguksa admission is free. The forest trail to Seokguram starts behind/above the temple — 2.2 km uphill through pine forest (~1 hr up, 40 min down). Seokguram admission: 5,000 won. Restrooms at both Bulguksa and Seokguram. Bring water — no shops on forest trail. Return same way to car.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (5,000 KRW).","hwangridan":"Hwangridan-gil is Gyeongju's trendy street blending ancient heritage with hip cafés, boutiques, and restaurants in renovated hanok buildings. Ideal for dinner after temple visits.<br><br>🎫 <b>Booking:</b> No reservation needed.","wolji":"Wolji Pond (formerly Anapji) is a Silla Dynasty palace garden from 674 AD. The pond and three islands are flanked by pavilions that reflect perfectly in still water. Visit at night when illuminated — one of Korea's most magical evening scenes.<br><br>🎫 <b>Booking:</b> No reservation needed. Tickets on-site (3,000 KRW). Open until 22:00.","jagalchi":"Jagalchi Market is Korea's largest seafood market along Busan's waterfront. Upper-floor restaurants prepare fresh catches on the spot.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry.","biff":"BIFF Square honors Busan's film festival with handprints of directors and stars. The surrounding streets are packed with street food, especially hotteok (sweet stuffed pancakes).<br><br>🎫 <b>Booking:</b> No reservation needed.","blueline":"Haeundae Blueline Park features the Sky Capsule — colorful pods gliding along a coastal rail track with ocean views. Book tickets online in advance as they sell out.<br><br>🎫 <b>Booking:</b> Advance booking required. Book at bluelinepark.com 2–4 weeks ahead. Sky Capsule sells out, especially sunset slots. ~40,000–50,000 KRW per capsule (2–4 people).","gukje":"Gukje Market is one of Busan's largest traditional markets, established by Korean War refugees in 1950. A maze of covered alleys selling everything from clothing to street food.<br><br>🎫 <b>Booking:</b> No reservation needed.","busan_station":"Busan Station is the city's main KTX hub, connecting to Seoul in about 2.5 hours. Book tickets via the Korail app in advance.<br><br>🎫 <b>Booking:</b> Book KTX tickets in advance via Korail app (letskorail.com). Popular times sell out.","hongdae":"Hongdae is Seoul's youthful creative neighborhood around Hongik University, famous for indie music, street performances, and nightlife. By day: quirky shops and cafés. By night: one of Seoul's liveliest districts.<br><br>🎫 <b>Booking:</b> No reservation needed.","bukhansan":"Bukhansan National Park is a dramatic granite mountain on Seoul's northern edge. The Bukhansanseong trail follows a historic fortress wall to rugged peaks with sweeping city views.<br><br>🧭 <b>LOGISTICS:</b> Subway Line 3 to Gupabal Station (Exit 1), then bus 704 to Bukhansanseong entrance (~15 min), or taxi from Gupabal (~6,000 won). Free trail map at the Information Center. Walk north through the fortress gate toward Baegundae Peak; 6.8 km round trip. Free, no ticket. Open sunrise to sunset. Restrooms and snack shops at entrance; carry water for upper sections. Arrive early on weekends. Return same way.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry. Open sunrise to sunset.","icheon":"Icheon is Korea's center of ceramic arts, with a tradition dating to the Goryeo Dynasty. The annual Ceramic Festival showcases master potters and hands-on workshops. Also famous for some of Korea's best rice.<br><br>🎫 <b>Booking:</b> No reservation for general entry (free). Pottery workshops: book ahead as popular slots fill up.","naksan":"Naksan Park is a hilltop park on Seoul's old eastern fortress wall with panoramic views. The restored City Wall makes for a pleasant walk connecting to Ihwa Mural Village. Sunset is the best time.<br><br>🎫 <b>Booking:</b> No reservation needed. Free, open 24/7.","ihwa":"Ihwa Mural Village is an art-filled hillside neighborhood where colorful murals transform ordinary walls into an open-air gallery. Be respectful of residents.<br><br>🎫 <b>Booking:</b> No reservation needed.","gwangjang":"Gwangjang Market is Seoul's oldest traditional market (1905) and a must-visit for street food. Legendary for bindaetteok (mung bean pancakes), mayak gimbap, and yukhoe (beef tartare).<br><br>🎫 <b>Booking:</b> No reservation needed. First-come, first-served.","ddp":"Dongdaemun Design Plaza is Zaha Hadid's futuristic landmark, a hub for design exhibitions and cultural events. Striking at night with the LED rose garden illuminated.<br><br>🎫 <b>Booking:</b> No reservation for building/grounds (free). Special exhibitions may need tickets — check ddp.or.kr.","han_river_evening":"The Han River parks come alive as Seoulites gather to picnic and socialize. Ordering fried chicken and beer (chimaek) delivered to your riverside mat is a beloved tradition.<br><br>🎫 <b>Booking:</b> No reservation needed. Public parks, free and open.","hotel_seoul":"On departure day, most Seoul hotels offer luggage storage. Allow at least 90 minutes for transit to Incheon via AREX from Seoul Station.<br><br>🎫 <b>Booking:</b> No reservation needed (beyond hotel booking).","themed_cafe":"Korea is world-famous for its themed cafes — animal cafes (raccoons, sheep, cats), VR cafes, and the legendary Poop Cafe in Insadong where everything is poop-shaped and served in mini toilet bowls. Hilarious, Instagram-worthy, and uniquely Korean. Most are walk-in, 30–60 min visit, ~10,000–15,000 won including a drink.<br><br>🎫 <b>Booking:</b> No reservation needed. Walk in.","nanta_show":"NANTA is Korea's longest-running show — a non-verbal comedy where chefs turn pots, pans, and knives into musical instruments. Slapstick, high-energy, and hilarious with zero language barrier. ~90 minutes. Theaters in Myeongdong and Hongdae.<br><br>🎫 <b>Booking:</b> Advance booking recommended for discount. Book via Klook, Trazy, or nanta.co.kr.","pc_bang":"A PC Bang is a Korean gaming cafe with high-end PCs, fast internet, snacks, and drinks. A window into Korea's massive gaming culture. ~1,500 won/hour. Found on every block — just walk in, pick a seat, and game. Popular late-night activity.<br><br>🎫 <b>Booking:</b> No reservation needed. Walk in anytime, most open 24/7.","conv_store":"Eating triangle kimbap, cup ramyeon (with the hot water station), banana milk, and soju at a GS25 or CU convenience store at 1 AM is a quintessential Korean experience. Sounds silly but it's genuinely how Koreans snack. Many stores have indoor seating areas.<br><br>🎫 <b>Booking:</b> No reservation needed. Open 24/7.","dongdaemun_night":"Dongdaemun's massive shopping malls (Doota, Migliore, Hello apM) stay open until 5 AM. The energy is completely different from daytime — street food vendors, K-fashion bargains, and a buzzing nightlife atmosphere. The illuminated DDP building nearby is stunning at night.<br><br>🎫 <b>Booking:</b> No reservation needed.","samgwangsa":"Samgwangsa Temple is home to one of Korea's most spectacular Buddha's Birthday celebrations — over 40,000 colorful lotus lanterns covering the entire hillside temple complex. The lanterns are lit from late April through mid-May, and the sight at night is breathtaking. Free entry, no reservation. It's about 25 minutes by taxi from Haeundae. Best visited after sunset when all lanterns are illuminated.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry. Best after dark.","loveland":"Jeju Loveland is an outdoor sculpture park with 140 humorous and provocative statues themed around sexuality and relationships. Opened in 2004, it's uniquely Korean — campy, funny, and great for photos. Adults only (18+). Takes about 30 minutes to walk through. Near Jeju City, easy to slot in between other activities.<br><br>🎫 <b>Booking:</b> No reservation needed. ~9,000 won entry. Open 9 AM – 8 PM daily.","suwon_fortress":"Suwon Hwaseong Fortress is a UNESCO World Heritage Site built in 1796 by King Jeongjo. The 5.7km wall encircles the old city with gates, watchtowers, and command posts. The walk is easy with great views. Weekend performances include martial arts demos and guard ceremonies.<br><br>🧭 <b>LOGISTICS:</b> Train from Seoul Station to Suwon Station (~30 min, Line 1 or express). From Suwon Station, taxi to Paldalmun Gate (~10 min) or walk (~20 min). Start the wall walk at any gate. Free to walk the wall; Haenggung Palace entry ~1,500 won.<br><br>🎫 <b>Booking:</b> No reservation needed.","haenggung":"Hwaseong Haenggung was the temporary palace where King Jeongjo stayed during visits to his father's tomb. On weekends, the courtyard hosts traditional guard ceremonies and 24 Martial Arts demonstrations — colorful, energetic performances worth timing your visit around. Open 9 AM - 6 PM.<br><br>🎫 <b>Booking:</b> No reservation needed. ~1,500 won entry.","haenggung_street":"Haenggung Street is the vibrant pedestrian area near the palace, lined with ~30 handicraft workshops, indie cafes, galleries, and street food vendors. On weekends it comes alive with busking and performances. You can make your own ceramics, leather goods, or jewelry at the workshops.<br><br>🎫 <b>Booking:</b> No reservation needed. Walk-in workshops.","suwon_chicken":"Suwon Chicken Street (Tongdak-golmok) is a whole alley dedicated to Korean fried chicken — Suwon's signature dish. Multiple restaurants compete for the best chicken. Try the original whole fried chicken (tongdak). Busy on weekends — arrive by noon.<br><br>🎫 <b>Booking:</b> No reservation needed. Walk in.","starfield_coex":"Starfield Library is an iconic two-story open library inside COEX Mall in Gangnam. The towering 13m bookshelves are one of Seoul's most Instagram-famous sights. Free to visit, great for a 20-30 min browse. The mall has shops, food court, and an aquarium nearby.<br><br>🎫 <b>Booking:</b> No reservation needed. Free. Open until 10 PM.","jeongbang":"Jeongbang Waterfall is the only waterfall in Asia that falls directly into the ocean — a 23m cascade crashing onto the rocky shoreline. Quick 20 min stop. Near Seogwipo on the Jeju south coast, right on your driving route.<br><br>🎫 <b>Booking:</b> No reservation needed. ~2,000 won entry.","dongmun_market":"Jeju Dongmun Market is Jeju City's largest traditional market, packed with fresh tangerines, Jeju black pork, hallabong juice, seafood, and local snacks. Great for an evening food walk after dinner. Near your Grabel Hotel.<br><br>🎫 <b>Booking:</b> No reservation needed. Open until ~9 PM.","daereungwon":"Daereungwon is a park of large ancient Silla royal burial mounds (tumuli) — grassy hills containing kings and queens from over 1,000 years ago. Cheonmachong tomb is open to walk inside. Nearby Chomseongdae is the oldest surviving astronomical observatory in East Asia (7th century). Both are a 10 min walk from Hwangridan-gil.<br><br>🎫 <b>Booking:</b> No reservation needed. ~3,000 won entry.","deoksugung":"Deoksugung Palace is known for its beautiful stone wall walking path — one of Seoul's most romantic walks. The palace grounds mix traditional Korean and Western-style buildings. Guard ceremony at 11 AM, 2 PM, 3:30 PM. Quick stop on the way between neighborhoods.<br><br>🎫 <b>Booking:</b> No reservation needed. ~1,000 won entry.","ddp_night":"Dongdaemun Design Plaza is Zaha Hadid's futuristic aluminum landmark. At night, the LED rose garden beside it creates a magical photo spot. The surrounding Dongdaemun area has 24-hour shopping malls. Best visited after dark for the illumination.<br><br>🎫 <b>Booking:</b> No reservation needed. Grounds are free. Open 24/7 outside.","namdaemun":"Namdaemun Market is Seoul's largest traditional market, operating since 1414 — over 600 years of history. Thousands of stalls sell everything from street food and ginseng to clothing, kitchenware, and souvenirs at great prices. The food alleys are famous for kalguksu (noodle soup), hotteok, and japchae. It's mostly covered, so it works in rain too. Walk at your own pace — no tickets, no schedule.<br><br>🎫 <b>Booking:</b> No reservation needed. Free entry. Open daily ~7 AM to ~7 PM (some shops close Sundays).","banpo_bike":"Banpo Bridge is famous for its Moonlight Rainbow Fountain — the world's longest bridge fountain. It's a natural turnaround point for the Han River bike path, about 10 km from Yeouido. The bridge and Banpo Hangang Park have restrooms and cafes.<br><br>🎫 <b>Booking:</b> No reservation needed.","incheon_depart":"Incheon Airport's departure is smooth with excellent duty-free shopping and food courts past security. Arrive 2.5–3 hours before your flight.<br><br>🎫 <b>Booking:</b> No reservation needed beyond flight ticket. Arrive 2.5–3 hrs early.",
"dmz":"The DMZ (Demilitarized Zone) is the 4km-wide buffer between North and South Korea, one of the most heavily fortified borders on Earth. A half-day guided tour takes you to the Third Infiltration Tunnel (dug by North Korea for a surprise attack), Dora Observatory (where you look into North Korea through binoculars), and Imjingak Park. Book through a licensed tour operator 1–2 weeks ahead — you cannot visit independently. Bring your passport.<br><br>🎫 <b>Booking:</b> Advance booking required. Book through Klook, Viator, or authorized operator 3–5 days ahead. JSA/Panmunjom needs 72+ hrs and passport copy. Bring passport on tour day.",
"abijou":"Abijou Clinic in Myeongdong is one of Seoul's most popular skin clinics for tourists, with a 20-year track record and 3.5 million patients. The signature Aqua Peel facial (~$25–75, 30 min) deeply cleanses, extracts, and hydrates — you walk out glowing with zero downtime. They have 60 interpreters in 9 languages, luggage storage, and a tax refund kiosk. Both men and women of all ages do this — skincare in Korea is completely gender-neutral.<br><br>🎫 <b>Booking:</b> Walk-in OK. No advance booking needed for basic Aqua Peel. If busy, short wait — grab coffee nearby."};

let currentPage=0;
const totalPages=DAYS.length+4; // cover + 12 days + todo + info + missing
const mapInstances={};
const mapBounds={};

function toggleTodo(id){
  const cb=document.getElementById('cb-'+id);
  const row=document.getElementById('todo-row-'+id);
  if(cb.checked){
    localStorage.setItem('todo_'+id,'1');
    row.classList.add('done');
  }else{
    localStorage.removeItem('todo_'+id);
    row.classList.remove('done');
  }
}

function gmapsUrl(q){return `https://www.google.com/maps/search/${q.replace(/\+/g,'+')}+South+Korea`}
function showInfo(key,name){
  document.getElementById('modal-title').textContent=name.replace(/🥾|🚴/g,'').trim();
  document.getElementById('modal-body').innerHTML=DESC[key]||'No description available.';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show')}

function goPage(idx){
  idx=Math.max(0,Math.min(totalPages-1,idx));
  currentPage=idx;
  localStorage.setItem('lastPage',idx);
  document.querySelectorAll('.page').forEach((p,i)=>{
    p.classList.toggle('active',i===idx);
  });
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const btns=document.querySelectorAll('.nav-btn');
  if(btns[idx])btns[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  // Fix map rendering and zoom for newly visible page
  if(idx>0 && idx<=DAYS.length){
    const dayNum=DAYS[idx-1].num;
    setTimeout(()=>{
      const m=mapInstances[dayNum];
      if(!m)return;
      m.invalidateSize();
      const b=mapBounds[dayNum];
      if(b){
        if(b.center)m.setView(b.center,b.zoom);
        else m.fitBounds(b);
      }
    },50);
    // Restore saved tab
    const savedTab=localStorage.getItem('lastTab_'+dayNum);
    if(savedTab)switchTab(dayNum,savedTab);
  }
  window.scrollTo(0,0);
}

function switchTab(dayNum,tabName){
  document.querySelectorAll(`[data-day="${dayNum}"] .tab-btn`).forEach(b=>b.classList.toggle('active',b.dataset.tab===tabName));
  document.querySelectorAll(`[data-day="${dayNum}"] .tab-content`).forEach(c=>c.classList.toggle('active',c.dataset.tab===tabName));
  localStorage.setItem('lastTab_'+dayNum,tabName);
  if(tabName==='itinerary'){
    setTimeout(()=>{
      const m=mapInstances[dayNum];
      if(!m)return;
      m.invalidateSize();
      const b=mapBounds[dayNum];
      if(b){
        if(b.center)m.setView(b.center,b.zoom);
        else m.fitBounds(b);
      }
    },50);
  }
}

document.addEventListener('DOMContentLoaded',function(){
  // Set target=_blank on ALL links that go external or to PDFs
  const observer=new MutationObserver(function(){
    document.querySelectorAll('a').forEach(function(a){
      const href=a.getAttribute('href');
      if(!href||href.startsWith('#'))return;

function formatReply(reply){
  return reply
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/\n- /g,'\n• ')
    .replace(/\n/g,'<br>');
}

function loadChatMessages(){
  try{return JSON.parse(localStorage.getItem('chat_messages'))||[]}catch(e){return[]}
}
function saveChatMessages(arr){
  if(arr.length>100)arr.splice(0,arr.length-100);
  localStorage.setItem('chat_messages',JSON.stringify(arr));
}
function addChatMsg(role,html){
  const msgs=document.getElementById('chat-messages');
  const timeStr=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  msgs.innerHTML+=`<div class="chat-msg ${role}"><div class="bubble">${html}<div style="font-size:10px;color:#666;text-align:right;margin-top:4px">${timeStr}</div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  // Persist
  const stored=loadChatMessages();
  stored.push({role,html,time:timeStr});
  saveChatMessages(stored);
}
function restoreChatMessages(){
  const stored=loadChatMessages();
  if(stored.length===0)return;
  const msgs=document.getElementById('chat-messages');
  // Clear default welcome message if we have history
  msgs.innerHTML='';
  for(const m of stored){
    msgs.innerHTML+=`<div class="chat-msg ${m.role}"><div class="bubble">${m.html}${m.time?`<div style="font-size:10px;color:#666;text-align:right;margin-top:4px">${m.time}</div>`:''}</div></div>`;
  }
  msgs.scrollTop=msgs.scrollHeight;
}

// Image handling for chat
let pendingImage=null;

function handleChatImage(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const base64=e.target.result;
    pendingImage={data:base64.split(',')[1],mediaType:file.type||'image/jpeg'};
    document.getElementById('chat-img-thumb').src=base64;
    document.getElementById('chat-img-preview').style.display='inline-block';
  };
  reader.readAsDataURL(file);
  input.value='';
}

function clearChatImage(){
  pendingImage=null;
  document.getElementById('chat-img-preview').style.display='none';
  document.getElementById('chat-img-thumb').src='';
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg&&!pendingImage)return;
  input.value='';

  // Show user's message immediately
  addChatMsg('user',msg.replace(/</g,'&lt;'));

  // Handle local WanderGuide commands (before image processing)
  const lower=msg.toLowerCase().trim();
  if(lower==='alerts on'||lower==='turn alerts on'||lower==='enable alerts'||lower==='alerts off'||lower==='turn alerts off'||lower==='disable alerts'){
    const enable=lower.includes('on')||lower.includes('enable');
    const myName=localStorage.getItem('wanderguide_name');
    if(!myName){addChatMsg('bot','❌ Register first with: <b>register pushover YOUR_NAME YOUR_KEY</b>');return;}
    try{
      const res=await fetch(API_BASE+'/api/wanderguide/toggle',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({userName:myName,enabled:enable})
      });
      const data=await res.json();
      if(data.success)addChatMsg('bot',`📍 WanderGuide alerts <b>${enable?'enabled':'disabled'}</b> for <b>${myName}</b>.`);
      else addChatMsg('bot','❌ '+data.error);
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  const radiusMatch=lower.match(/(?:set )?radius (?:to )?(\d+)/);
  if(radiusMatch){
    const r=parseInt(radiusMatch[1]);
    if(r>=50&&r<=5000){setWanderSetting('radius',r);addChatMsg('bot',`📍 Alert radius set to <b>${r}m</b>`);}
    else addChatMsg('bot','📍 Radius must be between 50 and 5000 meters.');
    return;
  }
  const cdMatch=lower.match(/(?:set )?cooldown (?:to )?(\d+)/);
  if(cdMatch){
    const m=parseInt(cdMatch[1]);
    if(m>=1&&m<=120){setWanderSetting('cooldown',m*60*1000);addChatMsg('bot',`📍 Cooldown set to <b>${m} minutes</b> between alerts.`);}
    else addChatMsg('bot','📍 Cooldown must be between 1 and 120 minutes.');
    return;
  }
  const rvMatch=lower.match(/(?:set )?re-?alert (?:to )?(\d+\.?\d*)/);
  if(rvMatch){
    const h=parseFloat(rvMatch[1]);
    if(h>=0.5&&h<=24){setWanderSetting('revisit',h*3600*1000);addChatMsg('bot',`📍 Re-alert for same POI set to <b>${h} hours</b>.`);}
    else addChatMsg('bot','📍 Re-alert must be between 0.5 and 24 hours.');
    return;
  }
  if(lower==='wanderguide status'||lower==='alert status'||lower==='wg status'){
    const gps=userLat?`${userLat.toFixed(4)}, ${userLng.toFixed(4)}`:'not available';
    addChatMsg('bot',`📍 <b>WanderGuide Status</b><br>• Browser GPS: ${gps}<br>• POIs loaded: ${poiDatabase.length}<br>• Alerts: managed via Telegram DM (/alerts, /radius, /cooldown)<br>• Pushover: register here or via Telegram /register`);
    return;
  }
  if(lower==='clear alerts'||lower==='reset alerts'){
    localStorage.removeItem('wander_alerts');
    addChatMsg('bot','📍 Alert history cleared. All POIs will alert again.');
    return;
  }
  const pollMatch=lower.match(/(?:set )?poll(?:ing)? (?:to )?(\d+)/);
  if(pollMatch){
    const s=parseInt(pollMatch[1]);
    if(s>=5&&s<=120){
      setWanderSetting('poll',s*1000);
      clearInterval(proximityInterval);
      proximityInterval=setInterval(checkWebProximity,s*1000);
      addChatMsg('bot',`📍 GPS polling set to <b>every ${s} seconds</b>.`);
    }else addChatMsg('bot','📍 Polling interval must be between 5 and 120 seconds.');
    return;
  }
  const pushMatch=msg.match(/register pushover\s+(\S+)\s+(\S+)/i) || msg.match(/register pushover\s+(\S+)/i);
  if(pushMatch){
    const name=pushMatch[2]?pushMatch[1]:null;
    const key=pushMatch[2]||pushMatch[1];
    try{
      const res=await fetch(API_BASE+'/api/pushover/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name:name||sessionId,userKey:key,sendTest:true,webSessionId:sessionId})
      });
      const data=await res.json();
      if(data.success){localStorage.setItem('wanderguide_name',data.registeredName);addChatMsg('bot',`✅ Pushover registered for <b>${data.registeredName}</b>! A test notification was sent. Registered users: ${data.users.join(', ')}`)}
      else addChatMsg('bot','❌ Failed to register. Check your user key.');
    }catch(e){addChatMsg('bot','❌ Could not connect to server. Try again.');}
    return;
  }
  const iAmMatch=msg.match(/^i\s*am\s+(\S+)/i);
  if(iAmMatch){
    const newName=iAmMatch[1].trim();
    const oldName=localStorage.getItem('wanderguide_name');
    try{
      const res=await fetch(API_BASE+'/api/rename',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({oldName:oldName||null,newName,webSessionId:sessionId})
      });
      const data=await res.json();
      if(data.success){
        localStorage.setItem('wanderguide_name',data.name);
        addChatMsg('bot',`👋 Hi <b>${data.name}</b>! ${data.renamed?'Name updated from '+data.oldName+'.':'You are now linked to this session.'}`);
      }else addChatMsg('bot','❌ '+(data.error||'Failed'));
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  if(lower==='users'||lower==='/users'){
    try{
      const res=await fetch(API_BASE+'/api/pushover/users');
      const names=await res.json();
      if(names.length===0)addChatMsg('bot','No registered users.');
      else addChatMsg('bot',`👥 <b>Registered users:</b> ${names.join(', ')}`);
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  // Add POI with coordinates: "add poi at 37.5, 126.9: description" or "add poi at 37.5, 126.9 description"
  const addPoiCoordsMatch=msg.match(/add\s*poi\s*(?:at\s+)?(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)[:\s]+(.+)/i);
  if(addPoiCoordsMatch){
    const lat=parseFloat(addPoiCoordsMatch[1]);
    const lng=parseFloat(addPoiCoordsMatch[2]);
    const desc=addPoiCoordsMatch[3].trim();
    try{
      const res=await fetch(API_BASE+'/api/pois',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:desc.substring(0,50),lat,lng,desc,createdBy:localStorage.getItem('wanderguide_name')||sessionId})});
      const data=await res.json();
      if(data.success)addChatMsg('bot',`📍 POI added: "${desc}" at ${lat.toFixed(5)}, ${lng.toFixed(5)}. Total POIs: ${data.total}`);
      else addChatMsg('bot','❌ '+data.error);
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  // Add POI here: "add poi here: description" or "add poi here description"
  const addPoiHereMatch=msg.match(/add\s*poi\s*here[:\s]+(.+)/i);
  if(addPoiHereMatch){
    startGPS();
    if(!userLat||!userLng){addChatMsg('bot','📍 Getting your location... Allow permission if prompted, then try again in a few seconds.');return;}
    const desc=addPoiHereMatch[1].trim();
    try{
      const res=await fetch(API_BASE+'/api/pois',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:desc.substring(0,50),lat:userLat,lng:userLng,desc,createdBy:localStorage.getItem('wanderguide_name')||sessionId})});
      const data=await res.json();
      if(data.success)addChatMsg('bot',`📍 POI added: "${desc}" at ${userLat.toFixed(5)}, ${userLng.toFixed(5)}. Total POIs: ${data.total}`);
      else addChatMsg('bot','❌ '+data.error);
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  if(lower==='clear my pois'||lower==='clear my poi'||lower==='delete my pois'){
    const myName=localStorage.getItem('wanderguide_name');
    if(!myName){addChatMsg('bot','❌ Register first with: <b>register pushover YOUR_NAME YOUR_KEY</b>');return;}
    try{
      const res=await fetch(API_BASE+'/api/pois?user='+encodeURIComponent(myName),{method:'DELETE'});
      const data=await res.json();
      if(data.success){
        await fetchPois();
        addChatMsg('bot',`🗑️ Cleared your POIs (${myName}). Shared POIs from others are unaffected.`);
      }else addChatMsg('bot','❌ '+(data.error||'Failed'));
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  if(lower==='nearby'||lower==='/nearby'){
    startGPS();
    if(!userLat||!userLng){addChatMsg('bot','📍 Getting your location... Allow permission if prompted, then try "nearby" again in a few seconds.');return;}
    // Refresh POI database from server first
    await fetchPois();
    const nearbyRadius=getWanderSetting('radius',DEFAULT_RADIUS)*3;
    const nearby=poiDatabase.map(p=>({...p,dist:Math.round(haversine(userLat,userLng,p.lat,p.lng))})).filter(p=>p.dist<=nearbyRadius).sort((a,b)=>a.dist-b.dist);
    if(nearby.length===0){addChatMsg('bot','No known POIs within 1km.');return;}
    const list=nearby.map((p,i)=>`${i+1}. <b>${p.name}</b> (${p.dist}m)<br>   ${(p.desc||'').substring(0,80)}...`).join('<br><br>');
    addChatMsg('bot',`📍 <b>Nearby places (within 1km):</b><br><br>${list}`);
    return;
  }
  // Send push to specific user: @username message
  const atMatch=msg.match(/^@(\S+)\s+(.+)/);
  if(atMatch){
    const to=atMatch[1];
    const pushMsg=atMatch[2];
    try{
      const res=await fetch(API_BASE+'/api/push',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to,message:pushMsg,from:sessionId})
      });
      const data=await res.json();
      if(data.success)addChatMsg('bot',`✅ Push sent to <b>${data.sentTo}</b>: "${pushMsg}"`);
      else addChatMsg('bot',`❌ ${data.error}`);
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  // Broadcast to all: broadcast message
  if(lower.startsWith('broadcast ')){
    const broadcastMsg=msg.substring(10).trim();
    if(!broadcastMsg){addChatMsg('bot','Usage: broadcast Your message here');return;}
    try{
      const res=await fetch(API_BASE+'/api/push',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to:'all',message:broadcastMsg})
      });
      const data=await res.json();
      if(data.success)addChatMsg('bot',`📢 Broadcast sent to: <b>${data.sentTo.join(', ')}</b>`);
      else addChatMsg('bot',`❌ ${data.error}`);
    }catch(e){addChatMsg('bot','❌ Could not connect to server.');}
    return;
  }
  if(lower==='clear chat'||lower==='reset chat'){
    localStorage.removeItem('chat_messages');
    document.getElementById('chat-messages').innerHTML='<div class="chat-msg bot"><div class="bubble">Chat cleared. How can I help?</div></div>';
    return;
  }
  if(lower==='help'||lower==='commands'||lower==='/help'){
    addChatMsg('bot',`<b>💬 Web Chat Commands:</b><br><br><b>WanderGuide:</b><br>• <b>nearby</b> — show POIs within 1km<br>• <b>wanderguide status</b> — show GPS and POI count<br><br><b>POIs:</b><br>• <b>"add POI here: description"</b> — add at your GPS location<br>• <b>"add POI at 37.5, 126.9: description"</b> — add at coordinates<br>• <b>"clear my POIs"</b> — remove all custom POIs<br><br><b>People:</b><br>• <b>users</b> — list registered users<br>• <b>register pushover [name] [key]</b> — register for push notifications<br>• <b>@name message</b> — push message to a specific person<br>• <b>broadcast message</b> — push to everyone<br><br><b>Vouchers:</b><br>• Ask "show me the car rental voucher" or "Jeju hotel confirmation"<br><br><b>Photos:</b><br>• Tap 📷 → snap or choose from gallery → "translate this"<br><br><b>Other:</b><br>• <b>I am NAME</b> — set or change your display name<br>• <b>clear chat</b> — wipe visible chat history<br>• Anything else — ask naturally about the trip`);
    return;
  }

  // Capture image before sending
  let imageData=pendingImage;
  pendingImage=null;
  clearChatImage();

  // Show image if attached (text already shown above)
  if(imageData){
    addChatMsg('user',`<img src="data:${imageData.mediaType};base64,${imageData.data}">${msg?'':'📷 Photo'}`);
  }

  // If user mentions "here" or "my location", append GPS if available
  let enrichedMsg=msg;
  if(userLat&&userLng&&(msg.toLowerCase().includes('here')||msg.toLowerCase().includes('my location')||msg.toLowerCase().includes('nearby'))){
    enrichedMsg+=` [User location: ${userLat.toFixed(5)}, ${userLng.toFixed(5)}]`;
  }

  document.getElementById('chat-typing').classList.add('show');
  document.getElementById('chat-send').disabled=true;

  try{
    const payload={message:enrichedMsg||'What is this?'};
    if(imageData)payload.image=imageData;
    const res=await fetch(API_BASE+'/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Session-Id':sessionId},
      body:JSON.stringify(payload)
    });
    const data=await res.json();
    const reply=data.reply||data.error||'No response';
    addChatMsg('bot',formatReply(reply));
  }catch(err){
    addChatMsg('bot','Sorry, couldn\'t connect. Check your internet and try again.');
  }

  document.getElementById('chat-typing').classList.remove('show');
  document.getElementById('chat-send').disabled=false;
}

// Defaults
const DEFAULT_RADIUS=300;
const DEFAULT_COOLDOWN=20*60*1000;
const DEFAULT_REVISIT=4*60*60*1000;

// Create alert sound (short chime)
const alertAudioCtx=typeof AudioContext!=='undefined'?new AudioContext():null;
function playAlertSound(){
  if(!alertAudioCtx)return;
  if(alertAudioCtx.state==='suspended')alertAudioCtx.resume();
  const o=alertAudioCtx.createOscillator();
  const g=alertAudioCtx.createGain();
  o.connect(g);g.connect(alertAudioCtx.destination);
  o.frequency.value=880;o.type='sine';
  g.gain.setValueAtTime(0.3,alertAudioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01,alertAudioCtx.currentTime+0.5);
  o.start();o.stop(alertAudioCtx.currentTime+0.5);
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkWebProximity(){
  if(!userLat||!userLng||poiDatabase.length===0)return;
  if(getWanderSetting('enabled',true)===false)return;
  const now=Date.now();
  const radius=getWanderSetting('radius',DEFAULT_RADIUS);
  const cooldown=getWanderSetting('cooldown',DEFAULT_COOLDOWN);
  const revisit=getWanderSetting('revisit',DEFAULT_REVISIT);

  for(const poi of poiDatabase){
    const dist=Math.round(haversine(userLat,userLng,poi.lat,poi.lng));
    if(dist>radius)continue;
    const lastAlert=getAlertTime(poi.name);
    if(lastAlert&&(now-lastAlert)<revisit)continue;
    // Check global cooldown
    const lastAny=getLastAlertTimeAny();
    if(lastAny&&(now-lastAny)<cooldown)continue;

    setAlertTime(poi.name);
    // Show alert in chat
    const now=new Date();
    const timeStr=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const mapsUrl=`https://www.google.com/maps/@${poi.lat},${poi.lng},17z`;
    const alertMsg=`📍 <b>You're ${dist}m from ${poi.name}!</b> <span style="color:#888;font-size:12px">${timeStr}</span><br>${poi.desc||''}<br><a href="${mapsUrl}" target="_blank">🗺️ Open in Maps</a>`;
    addChatMsg('bot',alertMsg);
    playAlertSound();
    // Show toast notification
    showProximityToast(poi.name,dist);
    // Send Pushover notification via server
    fetch(API_BASE+'/api/alert',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({poiName:poi.name,distance:dist,desc:poi.desc||'',lat:poi.lat,lng:poi.lng,sessionId})
    }).catch(()=>{});
    break;// one at a time
  }
}

function showProximityToast(name,dist){
  let toast=document.getElementById('proximity-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='proximity-toast';
    toast.style.cssText='position:fixed;top:20px;left:16px;right:16px;z-index:3000;background:#1a4a1a;border:1px solid #2ecc71;border-radius:12px;padding:14px 16px;color:#2ecc71;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;cursor:pointer';
    toast.onclick=()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300);toggleChat()};
    document.body.appendChild(toast);
  }
  toast.innerHTML=`📍 <b>${dist}m from ${name}</b> — tap to see details`;
  toast.style.opacity='1';
  setTimeout(()=>{if(toast)toast.style.opacity='0';setTimeout(()=>{if(toast.parentNode)toast.remove()},300)},8000);
}

// Start GPS tracking (for nearby command and add POI only — NOT for proximity alerts)
let gpsStarted=false;
function startGPS(){
  if(gpsStarted||!navigator.geolocation)return;
  gpsStarted=true;
  navigator.geolocation.watchPosition(
    pos=>{userLat=pos.coords.latitude;userLng=pos.coords.longitude},
    err=>{console.log('GPS error:',err.message)},
    {enableHighAccuracy:true,maximumAge:30000,timeout:10000}
  );
}

// Fetch POI database from server
async function fetchPois(){
  try{
    const res=await fetch(API_BASE+'/api/pois');
    poiDatabase=await res.json();
    console.log('POI database loaded:',poiDatabase.length,'places');
  }catch(err){console.log('Could not load POI database:',err.message)}
}

// Poll for proximity alerts from server (generated by Telegram location tracking)
let lastAlertPollTime=Date.now()-300000;
async function pollAlerts(){
  try{
    let myName=localStorage.getItem('wanderguide_name');
    if(!myName){
      try{
        const r=await fetch(API_BASE+'/api/whoami?session='+encodeURIComponent(sessionId));
        const d=await r.json();
        if(d.name){myName=d.name;localStorage.setItem('wanderguide_name',myName);}
      }catch(e){}
    }
    const res=await fetch(API_BASE+'/api/alerts?since='+lastAlertPollTime+(myName?'&user='+encodeURIComponent(myName):''));
    const alerts=await res.json();
    for(const a of alerts){
      addChatMsg('bot',a.text);
      playAlertSound();
      showProximityToast(a.text.match(/from (.+?)!/)?.[1]||'POI',0);
      if(a.time>lastAlertPollTime)lastAlertPollTime=a.time;
    }
  }catch(err){/* silent */}
}

// Poll for broadcast messages (scheduled messages)
let lastBroadcastTime=Date.now();
async function pollBroadcasts(){
  try{
    const res=await fetch(API_BASE+'/api/broadcasts?since='+lastBroadcastTime);
    const msgs=await res.json();
    for(const m of msgs){
      addChatMsg('bot','📢 '+formatReply(m.text));
      if(m.time>lastBroadcastTime)lastBroadcastTime=m.time;
      playAlertSound();
    }
  }catch(err){/* silent */}
}

// Initialize GPS, POIs, and broadcast polling
document.addEventListener('DOMContentLoaded',()=>{
  // Enable audio context on first user interaction (iOS requirement)
  document.addEventListener('click',()=>{if(alertAudioCtx&&alertAudioCtx.state==='suspended')alertAudioCtx.resume()},{once:true});
  restoreChatMessages();
  // Restore last viewed page (without animation)
  const lastPage=parseInt(localStorage.getItem('lastPage'));
  if(lastPage&&lastPage>0)goPage(lastPage);
  // Restore chat open state, or open if ?chat=1 in URL (from Pushover tap)
  if(window.location.search.includes('chat=1')||localStorage.getItem('chatOpen')==='1'){
    toggleChat();
    // Clean the URL parameter
    if(window.location.search.includes('chat=1'))history.replaceState(null,'',window.location.pathname);
    // Immediately poll for alerts
    setTimeout(pollAlerts,500);
  }
  // Show body after restore is complete
  setTimeout(()=>{document.body.style.opacity='1'},100);
  startGPS();
  fetchPois();
  // Re-fetch POIs every 5 min (picks up newly added POIs)
  setInterval(fetchPois,5*60*1000);
  // Poll broadcasts every 60 seconds
  setInterval(pollBroadcasts,60*1000);
  // Poll server for proximity alerts (generated by Telegram location tracking)
  setInterval(pollAlerts,5*1000);
  // Immediately poll when app becomes visible again (returning from background)
  document.addEventListener('visibilitychange',()=>{if(!document.hidden){pollAlerts();pollBroadcasts();}});
});

document.addEventListener('DOMContentLoaded',build);
</script>
